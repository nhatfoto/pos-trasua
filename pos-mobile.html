<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#d81b60">
<title>Trà Sữa Như Say POS Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<style>
body{font-family:'Be Vietnam Pro',system-ui;background:#fff7fb;overscroll-behavior-y:contain}
*{ -webkit-tap-highlight-color:transparent }
.no-scrollbar::-webkit-scrollbar{display:none}
.shadow-soft{box-shadow:0 6px 20px rgba(216,27,96,.08)}
.shadow-float{box-shadow:0 12px 32px rgba(216,27,96,.18)}
.pill{transition:.2s}
.pill-active{background:linear-gradient(135deg,#d81b60,#ff4081);color:#fff}
</style>
</head>
<body class="text-[15px]">
<!-- LOGIN -->
<div id="login" class="fixed inset-0 grid place-items-center p-6" style="background:linear-gradient(135deg,#d81b60,#ff5a92)">
  <div class="w-full max-w-[350px] bg-white rounded-[30px] p-8 shadow-2xl text-center">
    <div class="text-[52px] mb-2">🧋</div>
    <h1 class="text-[28px] font-extrabold">Trà Sữa Như Say</h1>
    <p class="text-zinc-500 mb-6">0347.047.141 - 0523.83.36.83</p>
    <input id="pw" type="password" inputmode="numeric" placeholder="••••••" class="w-full h-[56px] rounded-2xl bg-zinc-100 text-center text-[24px] tracking-[0.3em] font-bold outline-none focus:ring-4 focus:ring-pink-200">
    <button id="btnLogin" class="w-full h-[52px] mt-4 rounded-2xl bg-[#d81b60] text-white font-bold text-[17px] active:scale-95">Đăng nhập</button>
    <p id="err" class="text-red-500 text-sm h-5 mt-2"></p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none" class="max-w-[480px] mx-auto min-h-screen flex flex-col relative">
  <header class="sticky top-0 z-20 text-white" style="background:linear-gradient(135deg,#d81b60,#e91e63 50%,#ff4081)">
    <div class="pt-3 px-4 pb-3">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2.5">
          <div class="w-9 h-9 rounded-xl bg-white/20 grid place-items-center text-[20px]">🧋</div>
          <div class="font-extrabold text-[17px]">Như Say POS</div>
        </div>
        <div id="sync" class="text-[11px] opacity-90">● Đang kết nối</div>
      </div>
      <div id="tables" class="flex gap-2 overflow-x-auto no-scrollbar mt-3 -mx-1 px-1"></div>
    </div>
  </header>

  <div class="bg-white/80 backdrop-blur sticky top-[92px] z-10 border-b">
    <div class="p-3">
      <input id="search" placeholder="Tìm trà sữa, topping..." class="w-full h-11 px-4 rounded-xl bg-zinc-100 outline-none focus:bg-white focus:ring-2 focus:ring-pink-200">
    </div>
    <div id="cats" class="flex gap-2 px-3 pb-3 overflow-x-auto no-scrollbar"></div>
  </div>

  <main class="flex-1">
    <section id="v-ban" class="p-3 pb-32">
      <div id="grid" class="grid grid-cols-2 gap-3"></div>
      <div id="empty" class="hidden text-center py-20 text-zinc-400">Chưa có món</div>
    </section>
    <section id="v-don" class="hidden p-3 pb-32">
      <div class="flex justify-between items-center mb-3">
        <h2 class="text-[20px] font-bold">Đơn hôm nay</h2>
        <span id="countDon" class="bg-zinc-900 text-white text-xs px-2 py-1 rounded-full">0</span>
      </div>
      <div id="listDon" class="space-y-2.5"></div>
    </section>
    <section id="v-dt" class="hidden p-3 pb-32">
      <div class="grid grid-cols-2 gap-3">
        <div class="bg-white rounded-2xl p-4 shadow-soft"><div class="text-xs text-zinc-500">Doanh thu</div><div id="dtTotal" class="text-2xl font-extrabold text-[#d81b60] mt-1">0đ</div></div>
        <div class="bg-white rounded-2xl p-4 shadow-soft"><div class="text-xs text-zinc-500">Số đơn</div><div id="dtCount" class="text-2xl font-extrabold mt-1">0</div></div>
      </div>
      <div class="bg-white rounded-2xl p-4 shadow-soft mt-3">
        <div class="font-bold mb-2">Top bán chạy</div>
        <div id="topList" class="text-sm divide-y"></div>
      </div>
    </section>
  </main>

  <div id="cartBar" style="display:none" class="fixed bottom-20 inset-x-0 max-w-[480px] mx-auto px-3 z-20">
    <div class="bg-white rounded-2xl p-3 shadow-float flex items-center justify-between border">
      <div>
        <div class="text-[11px] text-zinc-500">Giỏ • <span id="cartTable">Mang về</span></div>
        <div id="cartTotal" class="text-[20px] font-extrabold text-[#d81b60]">0đ</div>
      </div>
      <button id="btnPay" class="h-11 px-5 rounded-xl bg-zinc-900 text-white font-bold">Thanh toán</button>
    </div>
  </div>

  <nav class="fixed bottom-0 inset-x-0 max-w-[480px] mx-auto bg-white border-t grid grid-cols-3 h-[68px] z-20">
    <button data-v="ban" class="flex flex-col items-center justify-center gap-0.5 text-[#d81b60]"><span class="text-[22px]">🧋</span><span class="text-[11px] font-semibold">Bán</span></button>
    <button data-v="don" class="flex flex-col items-center justify-center gap-0.5 text-zinc-400"><span class="text-[22px]">📋</span><span class="text-[11px]">Đơn</span></button>
    <button data-v="dt" class="flex flex-col items-center justify-center gap-0.5 text-zinc-400"><span class="text-[22px]">💰</span><span class="text-[11px]">Doanh thu</span></button>
  </nav>
</div>

<!-- Success -->
<div id="ok" class="fixed inset-0 bg-black/60 hidden grid place-items-center z-50 p-6">
  <div class="bg-white rounded-3xl p-6 w-full max-w-[320px] text-center">
    <div class="w-16 h-16 mx-auto rounded-full bg-[#d81b60] grid place-items-center text-white text-3xl mb-3">✓</div>
    <div class="font-bold text-lg">Thành công</div>
    <div id="okId" class="text-sm text-zinc-500 mt-1"></div>
    <div id="okTotal" class="text-3xl font-black text-[#d81b60] mt-1"></div>
    <div class="grid grid-cols-2 gap-2 mt-5">
      <button id="okClose" class="h-11 rounded-xl bg-zinc-100 font-semibold">Xong</button>
      <button id="okPrint" class="h-11 rounded-xl bg-zinc-900 text-white font-semibold">In bill</button>
    </div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
const fmt=n=>new Intl.NumberFormat('vi-VN').format(n)+'đ';
const state={table:'Mang về',cart:[],products:[],cats:[],cat:'',orders:[],search:''};
const cfg={apiKey:"AIzaSyABseQ0_Me77MUWnu8ezVtcfCAS4XlRBjs",authDomain:"trasua-nhusay-d6708.firebaseapp.com",databaseURL:"https://trasua-nhusay-d6708-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"trasua-nhusay-d6708",storageBucket:"trasua-nhusay-d6708.firebasestorage.app",messagingSenderId:"626489476647",appId:"1:626489476647:web:65d82a552ad1bdb5d9b002"};
let db; try{firebase.initializeApp(cfg);db=firebase.database()}catch(e){}

// LOGIN - giữ 260426, không hiện gợi ý
$('btnLogin').onclick=()=>{if($('pw').value.trim()==='260426'){$('login').style.display='none';$('app').style.display='flex';init()}else{$('err').textContent='Sai mật khẩu';$('pw').value=''}};
$('pw').onkeydown=e=>{if(e.key==='Enter')$('btnLogin').click()};

function init(){
  renderTables();
  if(db){$('sync').textContent='● Đã kết nối';$('sync').style.color='#a7f3d0';
    db.ref('nhusay-pos/menu').on('value',s=>{const v=s.val();state.products=v?Object.values(v).map(x=>({...x,icon:x.icon||'🧋'})):[{id:'1',name:'Trà Sữa Truyền Thống',price:25000,category:'Trà Sữa',icon:'🧋'},{id:'2',name:'Trà Thái Xanh',price:25000,category:'Trà Sữa',icon:'💚'},{id:'3',name:'Trà Đào',price:25000,category:'Trà Trái Cây',icon:'🍑'},{id:'4',name:'Trân Châu',price:5000,category:'Topping',icon:'⚫'}];updateCats();renderGrid()});
    db.ref('nhusay-pos/orders').limitToLast(200).on('value',s=>{const v=s.val();state.orders=v?Object.values(v).sort((a,b)=>b.timestamp-a.timestamp):[];renderDon();renderDT()});
    db.ref('nhusay-pos/settings').on('value',s=>{const n=(s.val()||{}).tables||10;state.tables=['Mang về',...Array.from({length:n},(_,i)=>'Bàn '+(i+1))];renderTables()});
  }else{state.products=[{id:'1',name:'Trà Sữa TT',price:25000,category:'Trà Sữa',icon:'🧋'}];updateCats();renderGrid()}
  bind()
}
function renderTables(){const w=$('tables');w.innerHTML='';(state.tables||['Mang về','Bàn 1','Bàn 2','Bàn 3','Bàn 4','Bàn 5','Bàn 6','Bàn 7','Bàn 8','Bàn 9','Bàn 10']).forEach(t=>{const b=document.createElement('button');b.className='pill px-3 h-8 rounded-full text-[13px] whitespace-nowrap '+(t===state.table?'pill-active bg-white/90':'bg-white/20 text-white');b.textContent=t;b.onclick=()=>{state.table=t;$('cartTable').textContent=t;renderTables()};w.appendChild(b)})}
function updateCats(){state.cats=[...new Set(state.products.map(p=>p.category))];if(!state.cat||!state.cats.includes(state.cat))state.cat=state.cats[0]||'';const c=$('cats');c.innerHTML='';state.cats.forEach(x=>{const b=document.createElement('button');b.className='pill px-3.5 h-8 rounded-full text-[13px] '+(x===state.cat?'pill-active':'bg-zinc-100');b.textContent=x;b.onclick=()=>{state.cat=x;updateCats();renderGrid()};c.appendChild(b)})}
function renderGrid(){const g=$('grid');const kw=state.search;const list=state.products.filter(p=>p.category===state.cat&&p.name.toLowerCase().includes(kw));g.innerHTML='';$('empty').style.display=list.length?'none':'block';list.forEach(p=>{const el=document.createElement('button');el.className='bg-white rounded-2xl p-3 text-left shadow-soft active:scale-95 border';el.innerHTML=`<div class="flex gap-3"><div class="w-14 h-14 rounded-xl bg-pink-50 grid place-items-center text-[26px]">${p.icon}</div><div class="flex-1"><div class="font-bold leading-tight">${p.name}</div><div class="mt-2 flex justify-between items-center"><span class="text-[#d81b60] font-extrabold">${fmt(p.price)}</span><span class="w-7 h-7 rounded-lg bg-zinc-900 text-white grid place-items-center">+</span></div></div></div>`;el.onclick=()=>{const i=state.cart.findIndex(c=>c.id===p.id);if(i>-1)state.cart[i].qty++;else state.cart.push({...p,qty:1});updateCart()};g.appendChild(el)})}
function updateCart(){const total=state.cart.reduce((s,i)=>s+i.price*i.qty,0);$('cartTotal').textContent=fmt(total);$('cartBar').style.display=total?'block':'none';}
$('search').oninput=e=>{state.search=e.target.value.toLowerCase();renderGrid()};

function bind(){
  document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{document.querySelectorAll('section').forEach(s=>s.classList.add('hidden'));$('v-'+b.dataset.v).classList.remove('hidden');document.querySelectorAll('nav button').forEach(x=>x.classList.toggle('text-[#d81b60]',x===b));document.querySelectorAll('nav button').forEach(x=>x.classList.toggle('text-zinc-400',x!==b))});
  $('btnPay').onclick=checkout;
  $('okClose').onclick=()=>$('ok').classList.add('hidden');
  $('okPrint').onclick=()=>{if(state.last){printBill(state.last);setTimeout(()=>$('ok').classList.add('hidden'),500)}}
}
function checkout(){
  if(!state.cart.length)return;
  const now=new Date();const id='NS'+now.getFullYear().toString().slice(-2)+('0'+(now.getMonth()+1)).slice(-2)+('0'+now.getDate()).slice(-2)+'-'+String(state.orders.filter(o=>o.id&&o.id.startsWith('NS')).length+1).padStart(3,'0');
  const order={id,table:state.table,items:state.cart,total:state.cart.reduce((s,i)=>s+i.price*i.qty,0),time:now.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'}),date:now.toISOString().slice(0,10),timestamp:now.getTime()};
  if(db)db.ref('nhusay-pos/orders/'+id).set(order);
  state.last=order;state.cart=[];updateCart();
  $('okId').textContent=order.id+' • '+order.table;$('okTotal').textContent=fmt(order.total);$('ok').classList.remove('hidden');
  renderDon();renderDT();
}
function renderDon(){const today=new Date().toISOString().slice(0,10);const list=state.orders.filter(o=>o.date===today);$('countDon').textContent=list.length;$('listDon').innerHTML=list.map(o=>`<div class="bg-white rounded-xl p-3 shadow-soft flex justify-between"><div><div class="font-bold text-sm">${o.id}</div><div class="text-xs text-zinc-500">${o.table} • ${o.time}</div></div><div class="text-right"><div class="font-bold text-[#d81b60]">${fmt(o.total)}</div><button onclick='printBill(${JSON.stringify(o).replace(/'/g,"&#39;")})' class="text-[11px] underline">In</button></div></div>`).join('')||'<div class="text-center text-zinc-400 py-10">Chưa có đơn</div>'}
function renderDT(){const today=new Date().toISOString().slice(0,10);const list=state.orders.filter(o=>o.date===today);const total=list.reduce((s,o)=>s+o.total,0);$('dtTotal').textContent=fmt(total);$('dtCount').textContent=list.length;const top={};list.forEach(o=>o.items.forEach(i=>top[i.name]=(top[i.name]||0)+i.qty));const sorted=Object.entries(top).sort((a,b)=>b[1]-a[1]).slice(0,5);$('topList').innerHTML=sorted.map(([n,q])=>`<div class="flex justify-between py-2"><span>${n}</span><b>${q}</b></div>`).join('')||'<div class="text-zinc-400 py-6 text-center">Chưa có</div>'}

// IN BILL ĐẸP - có logo + SĐT
function printBill(o){
  if(typeof o==='string')o=JSON.parse(o.replace(/&#39;/g,"'"));
  const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${o.id}</title><style>@page{size:80mm auto;margin:4mm}body{font-family:Arial;width:72mm;font-size:13px;color:#000;margin:0;padding:4mm}h1{margin:0;text-align:center;font-size:22px;color:#d81b60}.c{text-align:center}.s{font-size:11px;color:#666}.line{border-top:1px dashed #000;margin:6px 0}.r{display:flex;justify-content:space-between;margin:3px 0}.b{font-weight:700}.t{font-size:18px;margin-top:4px}.foot{margin-top:8px;text-align:center;font-size:11px}</style></head><body><h1>🧋TRÀ SỮA NHƯ SAY</h1><div class="c s">Trà sữa đậm vị </p> Hương vị "Như Say" lòng bạn !!! </p> </p> 0347.047.141 - 0523.83.36.83 </p> </div><div class="c s">Ngã 3 cơ xưởng, Xuân Quế, Đồng Nai</div><div class="line"></div><div class="r"><span>Mã:</span><b>${o.id}</b></div><div class="r"><span>Bàn:</span><b>${o.table}</b></div><div class="r"><span>Giờ:</span><span>${o.time} ${o.date}</span></div><div class="line"></div>${o.items.map(i=>`<div class="r"><span>${i.name} x${i.qty}</span><span>${fmt(i.price*i.qty)}</span></div>`).join('')}<div class="line"></div><div class="r t b"><span>TỔNG CỘNG</span><span>${fmt(o.total)}</span></div><div class="line"></div><div class="foot">Cảm ơn quý khách!<br>Hẹn gặp lại 💖 </p> Wifi: Trà sữa Như Say </p> </p> Mật khẩu: 888888888 </p> </div></body></html>`;
  const ifr=document.createElement('iframe');
  ifr.style.position='fixed';ifr.style.width='0';ifr.style.height='0';ifr.style.border='0';ifr.style.right='0';ifr.style.bottom='0';
  document.body.appendChild(ifr);
  const doc=ifr.contentDocument||ifr.contentWindow.document;
  doc.open();doc.write(html);doc.close();
  setTimeout(()=>{ifr.contentWindow.focus();ifr.contentWindow.print();setTimeout(()=>document.body.removeChild(ifr),1000)},300);
}
window.printBill=printBill;
</script>
</body>
</html>
