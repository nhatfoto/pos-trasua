<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>POS Như Say</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
body{margin:0;font-family:system-ui;background:#fff5f8}
header{background:linear-gradient(135deg,#ff6b9d,#ff8fab);color:#fff;padding:12px;display:flex;align-items:center;gap:10px}
header img{width:44px;height:44px;border-radius:50%;border:2px solid #fff}
.wrap{max-width:1200px;margin:auto;padding:12px}
.tabs{display:flex;gap:8px;justify-content:center;margin:10px 0}
.tab{padding:10px 16px;border:none;border-radius:999px;background:#fff;font-weight:700;color:#d81b60;cursor:pointer}
.tab.active{background:#d81b60;color:#fff}
.grid{display:grid;grid-template-columns:1fr 360px;gap:16px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
.panel{background:#fff;border-radius:16px;padding:14px;box-shadow:0 4px 12px #0001}
.tables{display:flex;flex-wrap:wrap;gap:6px}
.tbtn{padding:8px 12px;border:1px solid #ffd0de;background:#fff;border-radius:10px;cursor:pointer}
.tbtn.active{background:#d81b60;color:#fff}
.cats{display:flex;gap:6px;overflow:auto;margin:8px 0}
.cbtn{padding:6px 12px;border:1px solid #ffd0de;background:#fff;border-radius:999px;white-space:nowrap;cursor:pointer}
.cbtn.active{background:#ffe4ec;color:#d81b60}
.prods{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.prod{background:#fff;border:1px solid #ffe4ec;border-radius:12px;padding:10px;text-align:center;cursor:pointer}
.price{color:#d81b60;font-weight:700}
.pay{width:100%;padding:12px;background:#d81b60;color:#fff;border:none;border-radius:10px;font-weight:700;margin-top:10px;cursor:pointer}
.modal{display:none;position:fixed;inset:0;background:#0006;align-items:center;justify-content:center}
.modal.show{display:flex}.box{background:#fff;padding:20px;border-radius:16px;text-align:center}
</style></head><body>
<header><img src="logo.png"><div><b>Trà Sữa Như Say</b><div style="font-size:12px">0347.047.141</div></div></header>
<div class="wrap">
<div class="tabs"><button class="tab active" onclick="v('bh')">Bán hàng</button><button class="tab" onclick="v('dt')">Doanh thu</button></div>
<div id="bh"><div class="grid">
<div class="panel">
<div class="tables" id="tbls"></div>
<input id="q" placeholder="Tìm món..." style="width:100%;padding:8px;border:1px solid #ffd0de;border-radius:8px;margin:8px 0">
<div class="cats" id="cats"></div><div class="prods" id="prods"></div>
</div>
<div class="panel">
<h3 id="tblName" style="margin:0 0 8px;color:#d81b60">Mang về</h3>
<div id="cart"></div>
<div style="display:flex;justify-content:space-between;font-weight:700;margin-top:8px">Tổng: <span id="sum">0đ</span></div>
<button class="pay" onclick="pay()">THANH TOÁN</button>
</div></div></div>
<div id="dt" style="display:none"><div class="panel"><h3>Hôm nay: <span id="today">0đ</span></h3><div id="hist"></div></div></div>
</div>
<div id="ok" class="modal"><div class="box"><div style="font-size:40px">✅</div><h3>Thành công!</h3><p id="oktxt"></p><button onclick="ok.classList.remove('show')">Đóng</button></div></div>
<script>
const cfg={apiKey:"AIzaSyABseQ0_Me77MUWnu8ezVtcfCAS4XlRBjs",authDomain:"trasua-nhusay-d6708.firebaseapp.com",databaseURL:"https://trasua-nhusay-d6708-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"trasua-nhusay-d6708"};
firebase.initializeApp(cfg);const db=firebase.database();const P='nhusay-pos';
const CATS={trasua:'Trà Sữa',tra:'Trà Trái Cây',latte:'Latte',yaourt:'Yaourt',anvat:'Ăn Vặt',topping:'Topping'};
let menu={},orders=[],carts={},table='Mang về',cat='trasua';
const fmt=n=>n.toLocaleString('vi-VN')+'đ';
function v(id){bh.style.display=id==='bh'?'block':'none';dt.style.display=id==='dt'?'block':'none';document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',(id==='bh'&&i===0)||(id==='dt'&&i===1)))}
function rt(){tbls.innerHTML=['Mang về',...Array(10).fill(0).map((_,i)=>`Bàn ${i+1}`)].map(t=>`<button class="tbtn ${t===table?'active':''}" onclick="st('${t}')">${t}</button>`).join('')}
function st(t){table=t;tblName.textContent=t;rt();rcart()}
function rc(){cats.innerHTML=Object.entries(CATS).map(([k,n])=>`<button class="cbtn ${k===cat?'active':''}" onclick="cat='${k}';rc();rp()">${n}</button>`).join('')}
function rp(){const q=qq.value.toLowerCase();prods.innerHTML=(menu[cat]||[]).filter(p=>p.name.toLowerCase().includes(q)).map((p,i)=>`<div class="prod" onclick="add(${i})"><div style="font-size:28px">${p.icon||'🧋'}</div><div>${p.name}</div><div class="price">${fmt(p.price)}</div></div>`).join('')}
function add(i){const p=menu[cat][i];carts[table]=carts[table]||[];const f=carts[table].find(x=>x.name===p.name);if(f)f.qty++;else carts[table].push({name:p.name,price:p.price,qty:1});save();rcart()}
function rcart(){const l=carts[table]||[];cart.innerHTML=l.length?l.map((it,i)=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dashed #eee">${it.name} x${it.qty}<span>${fmt(it.price*it.qty)} <button onclick="chg(${i},-1)">-</button><button onclick="chg(${i},1)">+</button></span></div>`).join(''):'<i>Chưa có món</i>';sum.textContent=fmt(l.reduce((s,x)=>s+x.price*x.qty,0))}
function chg(i,d){const a=carts[table];a[i].qty+=d;if(a[i].qty<1)a.splice(i,1);save();rcart()}
function save(){db.ref(P).set({menu,orders,carts})}
function pay(){const l=carts[table]||[];if(!l.length)return;const total=l.reduce((s,x)=>s+x.price*x.qty,0);const o={id:Date.now(),table,items:JSON.parse(JSON.stringify(l)),total,time:new Date().toISOString()};orders.unshift(o);carts[table]=[];save();rcart();upd();oktxt.textContent=`${table} - ${fmt(total)}`;ok.classList.add('show')}
function upd(){const td=new Date().toDateString();today.textContent=fmt(orders.filter(o=>new Date(o.time).toDateString()===td).reduce((s,o)=>s+o.total,0));hist.innerHTML=orders.slice(0,20).map(o=>`<div>${o.table}: ${o.items.map(i=>i.name+'x'+i.qty).join(', ')} - <b>${fmt(o.total)}</b></div>`).join('')}
const qq=document.getElementById('q');qq.oninput=rp;
db.ref(P).on('value',s=>{const d=s.val()||{};menu=d.menu||{trasua:[{name:'Trà sữa truyền thống',price:20000,icon:'🧋'},{name:'Trà sữa thái xanh',price:20000,icon:'🧋'},{name:'Trà sữa khoai môn',price:20000,icon:'🧋'}],tra:[],latte:[],yaourt:[],anvat:[],topping:[]};orders=d.orders||[];carts=d.carts||{};rt();rc();rp();rcart();upd()});
</script></body></html>
