<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Như Say POS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@500;700;800&family=Plus+Jakarta+Sans:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--pink:#ff5c8a;--pink2:#ff8db1;--cream:#fff7fa;--ink:#1f1f23;--muted:#7b7f87;--line:#ffe0e9;--card:#ffffff;--shadow:0 12px 40px rgba(255,92,138,.18);--r:22px}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;font-family:"Plus Jakarta Sans","Be Vietnam Pro",system-ui,sans-serif;background:
 radial-gradient(900px 500px at 90% -10%, #ffe7f0 0, transparent 60%),
 radial-gradient(800px 400px at -10% 10%, #fff1f6 0, transparent 55%),
 var(--cream);color:var(--ink)}
.app{display:grid;grid-template-columns:280px 1fr 380px;min-height:100vh}
@media(max-width:1200px){.app{grid-template-columns:1fr 380px}.sidebar{display:none}}
@media(max-width:980px){.app{grid-template-columns:1fr}.right{position:fixed;left:0;right:0;bottom:0;z-index:40}}

/* SIDEBAR */
.sidebar{position:sticky;top:0;height:100vh;padding:20px 16px;background:linear-gradient(180deg,#ffffffcc,#ffffff99);backdrop-filter:blur(14px);border-right:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.brand img{width:56px;height:56px;border-radius:50%;object-fit:cover;box-shadow:0 6px 18px rgba(0,0,0,.12);border:3px solid #fff}
.brand h1{font-family:"Be Vietnam Pro";font-size:1.25rem;margin:0;line-height:1.1}
.brand small{color:var(--muted)}
.nav{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.nav button{display:flex;align-items:center;gap:10px;width:100%;padding:12px 14px;border:1px solid var(--line);background:#fff;border-radius:14px;font-weight:700;cursor:pointer;transition:.18s}
.nav button.active,.nav button:hover{background:linear-gradient(135deg,var(--pink),var(--pink2));color:#fff;border-color:transparent;box-shadow:var(--shadow);transform:translateY(-1px)}
.nav .ico{font-size:1.1rem}
.shop-card{margin-top:auto;background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;box-shadow:0 6px 16px rgba(0,0,0,.05)}
.shop-card .row{display:flex;justify-content:space-between;font-size:.9rem;color:var(--muted)}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:30;background:#ffffffb3;backdrop-filter:saturate(180%) blur(10px);border-bottom:1px solid var(--line)}
.top-inner{max-width:1400px;margin:0 auto;padding:12px 16px;display:flex;gap:12px;align-items:center}
.search-wrap{flex:1;display:flex;align-items:center;gap:10px;background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:10px 12px;box-shadow:0 4px 12px rgba(0,0,0,.04)}
.search-wrap input{border:none;outline:none;width:100%;font-size:1rem;background:transparent}
.user-chip{margin-left:auto;display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);padding:8px 12px;border-radius:999px;cursor:pointer;font-weight:700}
.user-chip img{width:28px;height:28px;border-radius:50%}

/* MAIN */
.main{padding:18px 16px 120px}
.cats{display:flex;gap:10px;overflow:auto;padding:6px 2px 14px;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat{flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:10px 14px;background:#fff;border:1.5px solid var(--line);border-radius:999px;font-weight:700;color:#5b5f66;cursor:pointer;white-space:nowrap}
.cat.active{background:#fff0f5;border-color:#ffc2d4;color:#c2185b;box-shadow:0 4px 12px rgba(255,92,138,.15)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}
.card{position:relative;background:#fff;border:1px solid #ffe4ec;border-radius:20px;overflow:hidden;box-shadow:0 8px 24px rgba(255,92,138,.10);transition:.18s;cursor:pointer}
.card:hover{transform:translateY(-4px);box-shadow:0 16px 36px rgba(255,92,138,.18)}
.thumb{aspect-ratio:1/1;background:#fff5f8;display:grid;place-items:center;overflow:hidden}
.thumb img{width:100%;height:100%;object-fit:cover;transition:.3s}
.card:hover .thumb img{transform:scale(1.05)}
.badge{position:absolute;top:10px;right:10px;background:#ffffffee;border:1px solid #ffd0de;color:#d81b60;font-weight:800;padding:6px 10px;border-radius:999px;backdrop-filter:blur(6px)}
.info{padding:12px}
.name{font-weight:800;line-height:1.25;min-height:2.6em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.meta{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.add{width:36px;height:36px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--pink),var(--pink2));color:#fff;font-size:20px;cursor:pointer;box-shadow:0 8px 16px rgba(255,92,138,.3)}

/* RIGHT CART */
.right{padding:16px}
.cart{background:#ffffffd9;backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);display:flex;flex-direction:column;height:calc(100vh - 32px);overflow:hidden}
@media(max-width:980px){.cart{height:58vh;border-radius:24px 24px 0 0}}
.cart-h{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line);background:linear-gradient(#fff,#fff8fb)}
.cart-h h3{margin:0;color:#c2185b;font-family:"Be Vietnam Pro"}
.table-select{display:flex;gap:6px;flex-wrap:wrap;padding:10px 12px;border-bottom:1px dashed var(--line);background:#fff}
.table-select button{padding:8px 12px;border:1.5px solid var(--line);background:#fff;border-radius:10px;font-weight:700;cursor:pointer}
.table-select button.active{background:linear-gradient(135deg,var(--pink),var(--pink2));color:#fff;border-color:transparent}
.items{flex:1;overflow:auto;padding:12px;background:linear-gradient(transparent,#fff0f5aa)}
.empty{color:#9aa0a6;text-align:center;padding:40px 10px}
.item{display:flex;gap:10px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px;margin-bottom:8px}
.item img{width:44px;height:44px;border-radius:10px;object-fit:cover;background:#fff5f8}
.item .t{flex:1;min-width:0}
.item .n{font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .p{font-size:.9rem;color:var(--muted)}
.qty{display:flex;align-items:center;gap:6px}
.q{width:30px;height:30px;border:1px solid var(--line);background:#fff;border-radius:10px;font-weight:800;cursor:pointer}
.qv{min-width:24px;text-align:center;font-weight:800}
.foot{padding:14px;border-top:1px solid var(--line);background:#fff}
.sum{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sum strong{font-size:1.4rem;color:#c2185b}
.pay{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--pink),var(--pink2));color:#fff;font-weight:800;font-size:1.05rem;cursor:pointer;box-shadow:0 12px 24px rgba(255,92,138,.3)}
.pay:disabled{opacity:.5;box-shadow:none}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin:10px 0 16px}
.stat{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px;text-align:center;box-shadow:var(--shadow)}
.stat h4{margin:0 0 6px;color:#6b7280}
.stat .v{font-size:2rem;font-weight:800;color:#c2185b}

/* MODAL */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal.show{display:flex}
.box{background:#fff;border-radius:24px;padding:24px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);border:1px solid var(--line);text-align:center}
.box .ok{font-size:3rem}
</style>
</head>
<body>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyABseQ0_Me77MUWnu8ezVtcfCAS4XlRBjs",authDomain:"trasua-nhusay-d6708.firebaseapp.com",databaseURL:"https://trasua-nhusay-d6708-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"trasua-nhusay-d6708",storageBucket:"trasua-nhusay-d6708.firebasestorage.app",messagingSenderId:"626489476647",appId:"1:626489476647:web:04c27b8a7464a95ad9b002"};
firebase.initializeApp(firebaseConfig);const db=firebase.database();const DB='nhusay-pos';
</script>
<script>const u=sessionStorage.getItem('tsns_user');if(!u)location.href='index.html';const currentUser=JSON.parse(u);</script>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <img src="logo.png" alt="Như Say">
      <div><h1>Như Say</h1><small>Trà sữa & more</small></div>
    </div>
    <div class="nav">
      <button class="active" data-v="ban-hang" onclick="go('ban-hang',this)"><span class="ico">🧋</span>Bán hàng</button>
      <button data-v="doanh-thu" onclick="go('doanh-thu',this)"><span class="ico">📊</span>Doanh thu</button>
      <button id="btn-ql" data-v="quan-ly" onclick="go('quan-ly',this)"><span class="ico">⚙️</span>Quản lý menu</button>
    </div>
    <div class="shop-card">
      <div class="row"><span>Hôm nay</span><strong id="mini-day">0đ</strong></div>
      <div class="row"><span>Bàn đang dùng</span><strong id="mini-tables">0</strong></div>
    </div>
  </aside>

  <section>
    <div class="topbar"><div class="top-inner">
      <div class="search-wrap">🔍<input id="q" placeholder="Tìm trà sữa, topping..."></div>
      <div class="user-chip" onclick="logout()" title="Đăng xuất"><img src="logo.png"><span id="uname"></span></div>
    </div></div>

    <div class="main">
      <!-- BÁN HÀNG -->
      <div id="v-ban-hang">
        <div class="cats" id="cats"></div>
        <div class="grid" id="grid"></div>
      </div>
      <!-- DOANH THU -->
      <div id="v-doanh-thu" style="display:none">
        <div class="stats">
          <div class="stat"><h4>Hôm nay</h4><div class="v" id="s-day">0đ</div></div>
          <div class="stat"><h4>Tuần này</h4><div class="v" id="s-week">0đ</div></div>
          <div class="stat"><h4>Tháng này</h4><div class="v" id="s-month">0đ</div></div>
        </div>
        <div id="hist"></div>
      </div>
      <!-- QUẢN LÝ -->
      <div id="v-quan-ly" style="display:none">
        <div style="display:flex;gap:8px;margin-bottom:10px"><button class="cat" onclick="exp()">⬇️ Export</button><button class="cat" onclick="imp.click()">⬆️ Import</button><input id="imp" type="file" accept=".json" hidden></div>
        <div id="manage"></div>
      </div>
    </div>
  </section>

  <aside class="right">
    <div class="cart">
      <div class="cart-h"><h3 id="cart-title">Mang về</h3><span id="cart-count" style="background:#fff0f5;border:1px solid #ffd0de;padding:4px 10px;border-radius:999px;font-weight:800;color:#c2185b">0 món</span></div>
      <div class="table-select" id="tables"></div>
      <div class="items" id="items"><div class="empty">Chưa có món<br><small>Chọn món bên trái</small></div></div>
      <div class="foot">
        <div class="sum"><span>Tổng cộng</span><strong id="sum">0đ</strong></div>
        <button id="pay" class="pay" disabled>THANH TOÁN</button>
      </div>
    </div>
  </aside>
</div>

<div id="ok" class="modal"><div class="box"><div class="ok">✅</div><h2 style="color:#c2185b;margin:6px 0">Đã thanh toán!</h2><p id="ok-txt" style="color:#6b7280"></p><button onclick="ok.classList.remove('show')" style="margin-top:12px;padding:10px 16px;border:none;border-radius:12px;background:#fff0f5;color:#c2185b;font-weight:800;cursor:pointer">Đóng</button></div></div>

<script>
const CATS={trasua:'Trà Sữa',tra:'Trà Trái Cây',latte:'Latte',yaourt:'Yaourt',anvat:'Ăn Vặt',topping:'Topping'};
let menu={},orders=[],carts={},table='Mang về',cat='trasua',last=null;
const fmt=n=>new Intl.NumberFormat('vi-VN').format(n)+'đ';
function logout(){if(confirm('Đăng xuất?')){sessionStorage.removeItem('tsns_user');location.href='index.html'}}
document.getElementById('uname').textContent=currentUser.name;
if(currentUser.role!=='admin')document.getElementById('btn-ql').style.display='none';

function go(v,btn){document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');['ban-hang','doanh-thu','quan-ly'].forEach(id=>document.getElementById('v-'+id).style.display=id===v?'block':'none')}

function renderCats(){document.getElementById('cats').innerHTML=Object.entries(CATS).map(([k,n])=>`<div class="cat ${k===cat?'active':''}" onclick="cat='${k}';renderCats();renderGrid()">${n}</div>`).join('')}
function renderGrid(){const q=document.getElementById('q').value.toLowerCase();const list=(menu[cat]||[]).filter(p=>p.name.toLowerCase().includes(q));document.getElementById('grid').innerHTML=list.map((p,i)=>{const img=p.img||'';const thumb=img?`<img src="${img}">`:`<div style="font-size:2.4rem">${p.icon||'🧋'}</div>`;return `<div class="card" onclick="add('${cat}',${menu[cat].indexOf(p)})"><div class="thumb">${thumb}</div><div class="badge">${fmt(p.price)}</div><div class="info"><div class="name">${p.name}</div><div class="meta"><span style="color:#8a8f98;font-size:.9rem">Còn hàng</span><button class="add" onclick="event.stopPropagation();add('${cat}',${menu[cat].indexOf(p)})">+</button></div></div></div>`}).join('')||`<div style="grid-column:1/-1;text-align:center;color:#999;padding:40px">Không tìm thấy</div>`}
function renderTables(){const arr=['Mang về',...Array.from({length:10},(_,i)=>`Bàn ${i+1}`)];document.getElementById('tables').innerHTML=arr.map(t=>`<button class="${t===table?'active':''}" onclick="selectTable('${t}')">${t}</button>`).join('')}
function selectTable(t){table=t;document.getElementById('cart-title').textContent=t;renderTables();renderCart()}
function add(c,i){const p=menu[c][i];carts[table]=carts[table]||[];const f=carts[table].find(x=>x.name===p.name);if(f)f.qty++;else carts[table].push({...p,qty:1});save();renderCart();bump()}
function renderCart(){carts[table]=carts[table]||[];const list=carts[table];document.getElementById('cart-count').textContent=list.reduce((s,x)=>s+x.qty,0)+' món';document.getElementById('sum').textContent=fmt(list.reduce((s,x)=>s+x.price*x.qty,0));document.getElementById('pay').disabled=!list.length;document.getElementById('items').innerHTML=list.length?list.map((it,i)=>`<div class="item"><img src="${it.img||'logo.png'}"><div class="t"><div class="n">${it.name}</div><div class="p">${fmt(it.price)}</div></div><div class="qty"><button class="q" onclick="chg(${i},-1)">−</button><div class="qv">${it.qty}</div><button class="q" onclick="chg(${i},1)">+</button></div></div>`).join(''):`<div class="empty">Chưa có món<br><small>Chọn món bên trái</small></div>`;document.getElementById('mini-tables').textContent=Object.values(carts).filter(a=>a.length).length}
function chg(i,d){const a=carts[table];a[i].qty+=d;if(a[i].qty<1)a.splice(i,1);save();renderCart()}
function pay(){const list=carts[table];if(!list.length)return;const total=list.reduce((s,x)=>s+x.price*x.qty,0);const o={id:Date.now(),table,items:JSON.parse(JSON.stringify(list)),total,time:new Date().toISOString(),user:currentUser.user};orders.unshift(o);carts[table]=[];last=o;save();renderCart();renderStats();document.getElementById('ok-txt').textContent=`${table} • ${fmt(total)}`;document.getElementById('ok').classList.add('show');printBill(o)}
function printBill(o){const w=window.open('','_blank','width=320,height=600');w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Bill</title><style>@page{size:80mm auto;margin:0}body{font-family:'Courier New',monospace;width:72mm;padding:3mm;margin:0;font-size:12px}h1{font-size:15px;text-align:center;margin:0}hr{border:none;border-top:1px dashed #000;margin:5px 0}.r{text-align:right}</style></head><body onload="window.print();setTimeout(()=>window.close(),400)"><h1>TRÀ SỮA NHƯ SAY</h1><div style="text-align:center;font-size:11px">Ngã 3 cơ xương<br>0347.047.141</div><hr><div>HD:${o.id.toString().slice(-6)} - ${o.table}<br>${new Date(o.time).toLocaleString('vi-VN')}<br>NV:${o.user}</div><hr><table width="100%">${o.items.map(it=>`<tr><td>${it.name} x${it.qty}</td><td class="r">${(it.price*it.qty).toLocaleString('vi-VN')}</td></tr>`).join('')}</table><hr><div style="display:flex;justify-content:space-between;font-weight:bold"><span>TỔNG</span><span>${o.total.toLocaleString('vi-VN')}đ</span></div><div style="text-align:center;margin-top:6px">Cảm ơn quý khách!</div></body></html>`);w.document.close()}
function bump(){const b=document.getElementById('pay');b.style.transform='scale(1.03)';setTimeout(()=>b.style.transform='',120)}
function save(){db.ref(DB).update({menu,orders,carts})}
function renderStats(){const now=new Date();const td=now.toDateString();const sDay=orders.filter(o=>new Date(o.time).toDateString()===td).reduce((s,o)=>s+o.total,0);const wk=new Date(now);wk.setDate(now.getDate()-now.getDay());const sW=orders.filter(o=>new Date(o.time)>=wk).reduce((s,o)=>s+o.total,0);const sM=orders.filter(o=>new Date(o.time).getMonth()===now.getMonth()).reduce((s,o)=>s+o.total,0);s_day.textContent=fmt(sDay);s_week.textContent=fmt(sW);s_month.textContent=fmt(sM);document.getElementById('mini-day').textContent=fmt(sDay);document.getElementById('hist').innerHTML=orders.slice(0,30).map(o=>`<div style="background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px;margin-bottom:8px;display:flex;justify-content:space-between"><div><strong>${o.table}</strong> • ${o.items.map(i=>i.name+'x'+i.qty).join(', ')}<div style="color:#8a8f98;font-size:.85rem">${new Date(o.time).toLocaleString('vi-VN')}</div></div><strong style="color:#c2185b">${fmt(o.total)}</strong></div>`).join('')||'Chưa có đơn'}
function exp(){const b=new Blob([JSON.stringify(menu,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='menu-nhusay.json';a.click()}
document.getElementById('imp').onchange=e=>{const f=e.target.files[0];const r=new FileReader();r.onload=()=>{menu=JSON.parse(r.result);save();renderGrid()};r.readAsText(f)}
document.getElementById('q').oninput=renderGrid;
document.getElementById('pay').onclick=pay;
db.ref(DB).on('value',s=>{const d=s.val()||{};menu=d.menu||{};orders=d.orders||[];carts=d.carts||{};['Mang về',...Array.from({length:10},(_,i)=>`Bàn ${i+1}`)].forEach(t=>carts[t]=carts[t]||[]);renderCats();renderGrid();renderTables();renderCart();renderStats()});
</script>
</body>
</html>
