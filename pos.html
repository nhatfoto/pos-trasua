.head{max-width:1320px;margin:0 auto;display:flex;align-items:center;gap:14px}
.head img{width:52px;height:52px;border-radius:50%;border:3px solid #fff;object-fit:cover;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.head h1{font-family:"Be Vietnam Pro";font-size:1.3rem;margin:0;font-weight:800}
.head .sub{opacity:.95;font-size:.85rem}
.user{margin-left:auto;background:#ffffff22;border:1px solid #ffffff55;padding:8px 14px;border-radius:999px;font-weight:700;cursor:pointer;backdrop-filter:blur(6px)}
nav{position:sticky;top:76px;z-index:40;background:#ffffffb8;backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.navin{max-width:1320px;margin:0 auto;padding:10px 16px;display:flex;gap:8px;justify-content:center}
.tab{border:1px solid var(--line);background:#fff;padding:10px 18px;border-radius:999px;font-weight:700;color:#c2185b;cursor:pointer}
.tab.active,.tab:hover{background:linear-gradient(135deg,var(--pink),var(--pink2));color:#fff;border-color:transparent;box-shadow:var(--shadow)}
.view{max-width:1320px;margin:18px auto;padding:0 16px;display:none}
.view.active{display:block}
.pos{display:grid;grid-template-columns:1.1fr 380px;gap:20px}
@media(max-width:1020px){.pos{grid-template-columns:1fr;padding-bottom:340px}}
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);backdrop-filter:blur(10px)}
.tables{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.table-btn{border:1.5px solid var(--line);background:#fff;padding:9px 14px;border-radius:12px;font-weight:700;color:#666;cursor:pointer}
.table-btn.active{background:linear-gradient(135deg,var(--pink),var(--pink2));color:#fff;border-color:transparent;box-shadow:0 6px 16px rgba(255,92,138,.3)}
.search{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:12px;outline:none;font-size:1rem}
.search:focus{border-color:var(--pink2);box-shadow:0 0 0 4px #ffd6e3}
.cats{display:flex;gap:8px;overflow:auto;padding:8px 0 12px}
.cat-btn{white-space:nowrap;border:1.5px solid var(--line);padding:8px 14px;border-radius:999px;background:#fff;font-weight:700;color:#666;cursor:pointer}
.cat-btn.active{background:#fff0f5;color:#c2185b;border-color:#ffc2d4}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px}
.product{background:#fff;border:1px solid #ffe4ec;border-radius:18px;padding:12px;text-align:center;cursor:pointer;transition:.18s;box-shadow:0 6px 18px rgba(255,92,138,.08)}
.product:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(255,92,138,.18)}
.product img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:12px;margin-bottom:8px;background:#fff5f8}
.product .icon{font-size:2.3rem;margin:12px 0}
.product .name{font-weight:700;min-height:2.6em}
.product .price{display:inline-block;margin-top:6px;background:#fff0f5;color:#c2185b;font-weight:800;padding:6px 10px;border-radius:999px;border:1px solid #ffd0de}
.cart{position:sticky;top:132px;background:var(--card);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);display:flex;flex-direction:column;max-height:calc(100vh - 160px);overflow:hidden}
@media(max-width:1020px){.cart{position:fixed;left:12px;right:12px;bottom:12px;max-height:58vh}}
.cart-header{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;background:linear-gradient(#fff,#fff8fb)}
.cart-header h3{margin:0;color:#c2185b}
.cart-count{background:#fff0f5;border:1px solid #ffd0de;color:#c2185b;padding:4px 10px;border-radius:999px;font-weight:700}
.cart-items{flex:1;overflow:auto;padding:12px}
.cart-item{display:flex;gap:10px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:8px}
.cart-item img{width:40px;height:40px;border-radius:8px;object-fit:cover}
.qty-btn{width:30px;height:30px;border:1px solid var(--line);background:#fff;border-radius:8px;font-weight:800;color:#c2185b;cursor:pointer}
.cart-footer{padding:14px;border-top:1px solid var(--line);background:#fff}
.total{display:flex;justify-content:space-between;margin-bottom:10px}
.total strong{font-size:1.35rem;color:#c2185b}
.pay-btn{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--pink),var(--pink2));color:#fff;font-weight:800;font-size:1.05rem;cursor:pointer;box-shadow:0 10px 20px rgba(255,92,138,.3)}
.pay-btn:disabled{opacity:.5}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;margin-bottom:16px}
.stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;text-align:center;box-shadow:var(--shadow)}
.stat .value{font-size:1.9rem;font-weight:800;color:#c2185b}
</style>
</head>

let menu=JSON.parse(localStorage.getItem(LS_MENU))||DEFAULT_MENU;let orders=[];let carts={};let currentTable='Mang về';let currentCat='trasua';let lastOrder=null;
function saveAll(){localStorage.setItem(LS_MENU,JSON.stringify(menu));db.ref(DB_PATH).update({menu,orders,carts});}
function formatPrice(n){return new Intl.NumberFormat('vi-VN').format(n)+'đ';}
function switchView(v){document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));document.getElementById('view-'+v).classList.add('active');document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));document.getElementById('tab-'+v).classList.add('active');if(v==='doanh-thu')renderStats();if(v==='quan-ly')renderManageList();}

function selectCat(k){currentCat=k;renderCats();renderProducts();}

function selectTable(t){currentTable=t;document.querySelectorAll('.table-btn').forEach(b=>b.classList.toggle('active',b.dataset.table===t));document.getElementById('cart-title').textContent=t;renderCart();}
function addToCart(cat,idx){const p=menu[cat][idx];const cart=carts[currentTable];const f=cart.find(i=>i.name===p.name);if(f)f.qty++;else cart.push({name:p.name,price:p.price,icon:p.icon,img:p.img,qty:1});saveAll();renderCart();}
function renderCart(){const cart=carts[currentTable]||[];const list=document.getElementById('cart-list');list.innerHTML=cart.length?cart.map((it,i)=>`<div class="cart-item"><div class="cart-item-info"><div class="cart-item-name">${it.img?`<img src="${it.img}" style="width:24px;height:24px;border-radius:4px;vertical-align:middle;margin-right:4px">`:it.icon||''} ${it.name}</div><div class="cart-item-price">${formatPrice(it.price)}</div></div><div class="cart-qty"><button class="qty-btn" onclick="changeQty(${i},-1)">−</button><span class="qty">${it.qty}</span><button class="qty-btn" onclick="changeQty(${i},1)">+</button></div></div>`).join(''):`<div class="cart-empty">🛒<br>Chưa có món</div>`;const total=cart.reduce((s,i)=>s+i.price*i.qty,0);document.getElementById('cart-count').textContent=`${cart.reduce((s,i)=>s+i.qty,0)} món`;document.getElementById('total-amount').textContent=formatPrice(total);document.getElementById('payBtn').disabled=!cart.length;}
function changeQty(i,d){const c=carts[currentTable];c[i].qty+=d;if(c[i].qty<1)c.splice(i,1);saveAll();renderCart();}
function checkout(){const cart=carts[currentTable];if(!cart.length)return;const total=cart.reduce((s,i)=>s+i.price*i.qty,0);const order={id:Date.now(),table:currentTable,items:JSON.parse(JSON.stringify(cart)),total,time:new Date().toISOString(),user:currentUser.user};orders.unshift(order);carts[currentTable]=[];lastOrder=order;saveAll();renderCart();document.getElementById('successDetail').textContent=`${order.table} • ${formatPrice(total)}`;document.getElementById('successModal').classList.add('show');renderStats();}

</style></head><body onload="window.print();setTimeout(()=>window.close(),500)"><h1>TRÀ SỮA NHƯ SAY</h1><div class="center">Ngã 3 cơ xương, Ấp 2<br>ĐT: 0347.047.141</div><hr><div>HD:${o.id.toString().slice(-6)} - ${o.table}<br>${new Date(o.time).toLocaleString('vi-VN')}<br>NV:${o.user}</div><hr><table>${o.items.map(it=>`<tr><td>${it.name} x${it.qty}</td><td class="right">${(it.price*it.qty).toLocaleString('vi-VN')}</td></tr>`).join('')}</table><hr><table class="total"><tr><td>TỔNG</td><td class="right">${o.total.toLocaleString('vi-VN')}đ</td></tr></table><div class="center" style="margin-top:6px">Cảm ơn quý khách!</div><button onclick="window.print()">In lại</button></body></html>`);w.document.close();}
function renderStats(){const now=new Date();const today=now.toDateString();document.getElementById('stat-day').textContent=formatPrice(orders.filter(o=>new Date(o.time).toDateString()===today).reduce((s,o)=>s+o.total,0));const weekStart=new Date(now);weekStart.setDate(now.getDate()-now.getDay());document.getElementById('stat-week').textContent=formatPrice(orders.filter(o=>new Date(o.time)>=weekStart).reduce((s,o)=>s+o.total,0));document.getElementById('stat-month').textContent=formatPrice(orders.filter(o=>{const d=new Date(o.time);return d.getMonth()===now.getMonth()}).reduce((s,o)=>s+o.total,0));document.getElementById('history-list').innerHTML=orders.slice(0,50).map(o=>`<div class="history-item"><div class="history-info"><strong>${o.table}</strong> • ${o.items.map(i=>`${i.name}x${i.qty}`).join(', ')}<div class="history-time">${new Date(o.time).toLocaleString('vi-VN')} • ${o.user}</div></div><div class="history-total">${formatPrice(o.total)}</div></div>`).join('')||'Chưa có';const counts={};orders.forEach(o=>o.items.forEach(i=>counts[i.name]=(counts[i.name]||0)+i.qty));document.getElementById('top-products').innerHTML=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([n,q])=>`<div class="top-item"><span>${n}</span><strong>${q}</strong></div>`).join('');}
function clearHistory(){if(currentUser.role!=='admin'){alert('Chỉ admin được xóa!');return;}if(!confirm('Xóa hết lịch sử?'))return;orders=[];saveAll();renderStats();}
function renderManageList(){const c=document.getElementById('manageList');let h='';Object.entries(menu).forEach(([k,items])=>{h+=`<div class="manage-cat"><h3>${CATS[k]} (${items.length})</h3>`;items.forEach((p,i)=>{const thumb=p.img?`<img src="${p.img}" style="width:28px;height:28px;object-fit:cover;border-radius:4px;margin-right:6px">`:p.icon||'🧋';h+=`<div class="manage-item"><span>${thumb} ${p.name}</span><span>${formatPrice(p.price)}</span><div><button class="edit" onclick="editProduct('${k}',${i})">Sửa</button><button class="del" onclick="deleteProduct('${k}',${i})">Xóa</button></div></div>`});h+='</div>'});c.innerHTML=h;}
let editingCat,editingIdx;function editProduct(c,i){const p=menu[c][i];editingCat=c;editingIdx=i;editName.value=p.name;editPrice.value=p.price;editIcon.value=p.icon||'';editImg.value=p.img||'';editModal.classList.add('show');}
function saveEdit(){menu[editingCat][editingIdx]={name:editName.value,price:+editPrice.value,icon:editIcon.value,img:editImg.value};saveAll();renderManageList();renderProducts();editModal.classList.remove('show');}
function deleteProduct(c,i){if(!confirm('Xóa?'))return;menu[c].splice(i,1);saveAll();renderManageList();renderProducts();}
document.addEventListener('DOMContentLoaded',()=>{
  db.ref(DB_PATH).on('value',snap=>{const d=snap.val()||{};if(d.menu)menu=d.menu;if(d.orders)orders=d.orders;if(d.carts)carts=d.carts;['Mang về',...Array(10).fill(0).map((_,i)=>`Bàn ${i+1}`)].forEach(t=>{if(!carts[t])carts[t]=[]});localStorage.setItem(LS_MENU,JSON.stringify(menu));renderCats();renderProducts();renderCart();renderStats();});
  selectTable('Mang về');searchBox.oninput=renderProducts;payBtn.onclick=checkout;closeSuccess.onclick=closeModal;printBtn.onclick=printReceipt;clearHistoryBtn.onclick=clearHistory;exportBtn.onclick=()=>{const b=new Blob([JSON.stringify(menu,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='menu.json';a.click()};importBtn.onclick=()=>importFile.click();importFile.onchange=e=>{const f=e.target.files[0];const r=new FileReader();r.onload=()=>{menu=JSON.parse(r.result);saveAll();renderManageList()};r.readAsText(f)};productForm.onsubmit=e=>{e.preventDefault();const c=newCat.value;if(!menu[c])menu[c]=[];menu[c].push({name:newName.value,price:+newPrice.value,icon:newIcon.value,img:newImg.value});saveAll();e.target.reset();renderManageList();renderProducts()};cancelEdit.onclick=()=>editModal.classList.remove('show');saveEditBtn=saveEdit;document.getElementById('saveEdit').onclick=saveEdit;
});
