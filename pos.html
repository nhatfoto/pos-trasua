<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
:root{--pink:#ff5c8a;--pink-2:#ff8fab;--bg:#fff7f9;--card:#ffffffcc;--text:#2b2b2b;--muted:#7a7a7a;--ring:#ffd6e2;--shadow:0 10px 30px rgba(255,92,138,.18);--radius:20px}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Plus Jakarta Sans',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:radial-gradient(1200px 800px at 80% -10%, #ffe4ec 0%, transparent 60%),radial-gradient(900px 600px at -10% 20%, #fff0f5 0%, transparent 55%),var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
header{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,var(--pink),var(--pink-2));color:#fff;padding:18px 20px;box-shadow:0 8px 24px rgba(255,92,138,.25)}
.header-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{display:flex;align-items:center;gap:12px}
.brand .logo{width:40px;height:40px;border-radius:12px;background:#fff1f5;display:grid;place-items:center;font-size:22px;box-shadow:inset 0 0 0 2px #ffffff55}
.brand h1{font-size:1.35rem;letter-spacing:.3px;font-weight:800}
.brand .sub{font-size:.85rem;opacity:.95}
.user{cursor:pointer;background:#ffffff22;border:1px solid #ffffff44;padding:8px 12px;border-radius:999px;font-weight:600;backdrop-filter:blur(6px)}
nav{position:sticky;top:76px;z-index:40;background:#ffffffaa;backdrop-filter:saturate(180%) blur(10px);border-bottom:1px solid #ffe1ea}
.nav-inner{max-width:1280px;margin:0 auto;padding:10px 16px;display:flex;gap:8px;justify-content:center}
.tab{border:none;padding:10px 18px;border-radius:999px;background:#fff;color:#d6336c;font-weight:700;cursor:pointer;transition:.2s;box-shadow:0 2px 0 #ffe1ea}
.tab.active,.tab:hover{background:linear-gradient(135deg,var(--pink),var(--pink-2));color:#fff;transform:translateY(-1px);box-shadow:var(--shadow)}
.view{display:none;max-width:1280px;margin:18px auto;padding:0 16px}
.view.active{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.pos{display:grid;grid-template-columns:1.15fr .85fr;gap:20px;align-items:start}
@media(max-width:1024px){.pos{grid-template-columns:1fr;padding-bottom:340px}}
.panel{background:var(--card);backdrop-filter:blur(12px);border:1px solid #ffe1ea;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.tables{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.table-btn{border:1.5px solid #ffe1ea;background:#fff;padding:9px 14px;border-radius:12px;cursor:pointer;font-weight:700;color:#6b7280;transition:.18s}
.table-btn.active{background:linear-gradient(135deg,var(--pink),var(--pink-2));color:#fff;border-color:transparent;box-shadow:0 6px 16px rgba(255,92,138,.3)}
.search{width:100%;padding:13px 16px;border:1.5px solid #ffe1ea;border-radius:14px;font-size:1rem;outline:none;background:#fff;transition:.15s}
.search:focus{border-color:var(--pink-2);box-shadow:0 0 0 4px var(--ring)}
.cats{display:flex;gap:8px;overflow:auto;padding:10px 2px 14px;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat-btn{white-space:nowrap;border:1.5px solid #ffe1ea;padding:9px 16px;border-radius:999px;background:#fff;color:#6b7280;font-weight:700;cursor:pointer}
.cat-btn.active{background:#fff0f5;color:#d6336c;border-color:#ffb3c7}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px}
.product{position:relative;background:#fff;border:1px solid #ffe9f0;border-radius:18px;padding:12px;cursor:pointer;transition:.18s;box-shadow:0 4px 14px rgba(255,92,138,.08);overflow:hidden}
.product:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(255,92,138,.18);border-color:#ffc2d4}
.product .thumb{width:100%;aspect-ratio:1/1;border-radius:14px;background:#fff5f8;display:grid;place-items:center;overflow:hidden;margin-bottom:10px}
.product img{width:100%;height:100%;object-fit:cover}
.product .icon{font-size:2.4rem}
.product .name{font-weight:700;line-height:1.25;min-height:2.6em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.product .price{margin-top:6px;display:inline-flex;align-items:center;gap:6px;background:#fff0f5;color:#d6336c;font-weight:800;padding:6px 10px;border-radius:999px;border:1px solid #ffd0de}
.cart{position:sticky;top:132px;background:var(--card);backdrop-filter:blur(12px);border:1px solid #ffe1ea;border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;max-height:calc(100vh - 160px);overflow:hidden}
@media(max-width:1024px){.cart{position:fixed;left:12px;right:12px;bottom:12px;top:auto;max-height:58vh;border-radius:22px}}
.cart-header{padding:14px 16px;border-bottom:1px solid #ffe1ea;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,#ffffffcc,#ffffff99)}
.cart-header h3{color:#d6336c;font-size:1.05rem;font-weight:800}
.cart-count{background:#fff0f5;color:#d6336c;padding:4px 10px;border-radius:999px;font-weight:700;border:1px solid #ffd0de}
.cart-items{flex:1;overflow:auto;padding:12px;background:linear-gradient(to bottom,transparent, #fff0f566)}
.cart-empty{color:#9aa0a6;text-align:center;padding:36px 12px}
.cart-item{display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #ffe1ea;border-radius:14px;padding:10px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,.03)}
.cart-item .thumb{width:40px;height:40px;border-radius:10px;background:#fff5f8;display:grid;place-items:center;overflow:hidden;flex:0 0 40px}
.cart-item .thumb img{width:100%;height:100%;object-fit:cover}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-item-price{font-size:.85rem;color:#6b7280}
.qty{display:flex;align-items:center;gap:6px}
.qty-btn{width:30px;height:30px;border:none;background:#fff;border:1px solid #ffe1ea;border-radius:10px;cursor:pointer;font-weight:800;color:#d6336c}
.qty-btn:hover{background:#fff0f5}
.qty-val{min-width:26px;text-align:center;font-weight:800}
.cart-footer{padding:14px;border-top:1px solid #ffe1ea;background:#ffffffee}
.total{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.total strong{font-size:1.35rem;color:#d6336c}
.pay-btn{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--pink),var(--pink-2));color:#fff;font-weight:800;font-size:1.05rem;cursor:pointer;box-shadow:0 10px 20px rgba(255,92,138,.3);transition:.15s}
.pay-btn:hover{transform:translateY(-1px);box-shadow:0 14px 26px rgba(255,92,138,.35)}
.pay-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;margin-bottom:18px}
.stat{background:var(--card);border:1px solid #ffe1ea;border-radius:18px;padding:18px;text-align:center;box-shadow:var(--shadow)}
.stat h4{color:#6b7280;font-size:.9rem;margin-bottom:6px}
.stat .value{font-size:1.9rem;font-weight:800;color:#d6336c}
.section{background:var(--card);border:1px solid #ffe1ea;border-radius:18px;padding:16px;box-shadow:var(--shadow);margin-bottom:16px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.btn{padding:9px 14px;border:none;border-radius:10px;cursor:pointer;font-weight:700}
.btn-primary{background:linear-gradient(135deg,var(--pink),var(--pink-2));color:#fff}
.btn-danger{background:#fff1f2;color:#e11d48;border:1px solid #ffd0d6}
.btn-secondary{background:#fff;border:1px solid #ffe1ea;color:#d6336c}
.manage-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.add-form{display:grid;grid-template-columns:120px 1fr 110px 90px 1.2fr auto;gap:8px;background:var(--card);padding:12px;border:1px solid #ffe1ea;border-radius:14px;box-shadow:var(--shadow)}
@media(max-width:860px){.add-form{grid-template-columns:1fr 1fr}.add-form button{grid-column:1/-1}}
.add-form input,.add-form select{padding:11px;border:1.5px solid #ffe1ea;border-radius:10px;font-size:.95rem;outline:none;background:#fff}
.add-form input:focus,.add-form select:focus{border-color:var(--pink-2);box-shadow:0 0 0 3px var(--ring)}
.manage-cat{margin:18px 0}
.manage-cat h3{color:#d6336c;margin-bottom:8px}
.manage-item{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fff;border:1px solid #ffe1ea;border-radius:12px;padding:10px;margin-bottom:8px}
.manage-item .left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.manage-item .left img{width:34px;height:34px;border-radius:8px;object-fit:cover}
.manage-item .price{color:#d6336c;font-weight:800;margin-right:8px}
.manage-item button{padding:7px 12px;border:none;border-radius:9px;cursor:pointer;font-weight:700}
.manage-item .edit{background:#eef6ff;color:#1d4ed8;border:1px solid #dbeafe}
.manage-item .del{background:#fff1f2;color:#e11d48;border:1px solid #ffd0d6}
.modal{display:none;position:fixed;inset:0;background:rgba(17,17,17,.45);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal.show{display:flex}
.modal-content{background:#fff;border-radius:22px;padding:26px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);border:1px solid #ffe1ea}
.success-icon{font-size:3.2rem;text-align:center;margin-bottom:8px}
</style>
</head>

<script>
function logout(){if(confirm('Đăng xuất?')){sessionStorage.removeItem('tsns_user');location.href='index.html';}}
document.getElementById('userInfo').textContent=`👤 ${currentUser.name}`;
document.getElementById('userInfo').onclick=logout;
if(currentUser.role!=='admin'){document.getElementById('tab-quan-ly').style.display='none';document.getElementById('clearHistoryBtn').style.display='none';}
const LS_MENU='tsns_menu_v34';
const CATS={trasua:'Trà Sữa',tra:'Trà Trái Cây',latte:'Latte',yaourt:'Yaourt',anvat:'Ăn Vặt',topping:'Topping'};
const DEFAULT_MENU={trasua:[{name:"Trà sữa truyền thống",price:25000,icon:"🧋",img:""},{name:"Trà sữa thái xanh",price:25000,icon:"💚",img:""},{name:"Trà sữa khoai môn",price:25000,icon:"💜",img:""}],tra:[{name:"Trà đào",price:20000,icon:"🍑",img:""},{name:"Trà vải",price:20000,icon:"🍒",img:""}],latte:[],yaourt:[],anvat:[],topping:[]};
let menu=JSON.parse(localStorage.getItem(LS_MENU))||DEFAULT_MENU;let orders=[];let carts={};let currentTable='Mang về';let currentCat='trasua';let lastOrder=null;
function saveAll(){localStorage.setItem(LS_MENU,JSON.stringify(menu));db.ref(DB_PATH).update({menu,orders,carts});}
function formatPrice(n){return new Intl.NumberFormat('vi-VN').format(n)+'đ';}
function switchView(v){document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));document.getElementById('view-'+v).classList.add('active');document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));document.getElementById('tab-'+v).classList.add('active');if(v==='doanh-thu')renderStats();if(v==='quan-ly')renderManageList();}
function renderCats(){document.getElementById('cats').innerHTML=Object.entries(CATS).map(([k,n])=>`<button class="cat-btn ${k===currentCat?'active':''}" onclick="selectCat('${k}')">${n}</button>`).join('');}
function selectCat(k){currentCat=k;renderCats();renderProducts();}
function renderProducts(){const grid=document.getElementById('products');const term=document.getElementById('searchBox').value.toLowerCase();const items=(menu[currentCat]||[]).filter(p=>p.name.toLowerCase().includes(term));grid.innerHTML=items.map(p=>{const i=menu[currentCat].indexOf(p);const thumb=p.img?`<img src="${p.img}" alt="">`:`<div class="icon">${p.icon||'🧋'}</div>`;return `<div class="product" onclick="addToCart('${currentCat}',${i})"><div class="thumb">${thumb}</div><div class="name">${p.name}</div><div class="price">${formatPrice(p.price)}</div></div>`;}).join('')||`<div style="text-align:center;padding:40px;color:#999">Không có món</div>`;}
function selectTable(t){currentTable=t;document.querySelectorAll('.table-btn').forEach(b=>b.classList.toggle('active',b.dataset.table===t));document.getElementById('cart-title').textContent=t;renderCart();}
function addToCart(cat,idx){const p=menu[cat][idx];const cart=carts[currentTable];const f=cart.find(i=>i.name===p.name);if(f)f.qty++;else cart.push({name:p.name,price:p.price,icon:p.icon,img:p.img,qty:1});saveAll();renderCart();}
function renderCart(){const cart=carts[currentTable]||[];const list=document.getElementById('cart-list');list.innerHTML=cart.length?cart.map((it,i)=>{const t=it.img?`<img src="${it.img}">`:`<span style="font-size:20px">${it.icon||'🧋'}</span>`;return `<div class="cart-item"><div class="thumb">${t}</div><div class="cart-item-info"><div class="cart-item-name">${it.name}</div><div class="cart-item-price">${formatPrice(it.price)}</div></div><div class="qty"><button class="qty-btn" onclick="changeQty(${i},-1)">−</button><div class="qty-val">${it.qty}</div><button class="qty-btn" onclick="changeQty(${i},1)">+</button></div></div>`}).join(''):`<div class="cart-empty">🛒<div style="margin-top:6px">Chưa có món</div></div>`;const total=cart.reduce((s,i)=>s+i.price*i.qty,0);document.getElementById('cart-count').textContent=`${cart.reduce((s,i)=>s+i.qty,0)} món`;document.getElementById('total-amount').textContent=formatPrice(total);document.getElementById('payBtn').disabled=!cart.length;}
function changeQty(i,d){const c=carts[currentTable];c[i].qty+=d;if(c[i].qty<1)c.splice(i,1);saveAll();renderCart();}
function checkout(){const cart=carts[currentTable];if(!cart.length)return;const total=cart.reduce((s,i)=>s+i.price*i.qty,0);const order={id:Date.now(),table:currentTable,items:JSON.parse(JSON.stringify(cart)),total,time:new Date().toISOString(),user:currentUser.user};orders.unshift(order);carts[currentTable]=[];lastOrder=order;saveAll();renderCart();document.getElementById('successDetail').textContent=`${order.table} • ${formatPrice(total)}`;document.getElementById('successModal').classList.add('show');renderStats();}
function closeModal(){document.getElementById('successModal').classList.remove('show');}
function printReceipt(){if(!lastOrder)return;const o=lastOrder;const w=window.open('','_blank','width=300,height=600');w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>In</title><style>

.header-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}

.brand .logo{width:40px;height:40px;border-radius:12px;background:#fff1f5;display:grid;place-items:center;font-size:22px;box-shadow:inset 0 0 0 2px #ffffff55}
.brand h1{font-size:1.35rem;letter-spacing:.3px;font-weight:800}
.brand .sub{font-size:.85rem;opacity:.95}
.user{cursor:pointer;background:#ffffff22;border:1px solid #ffffff44;padding:8px 12px;border-radius:999px;font-weight:600;backdrop-filter:blur(6px)}
nav{position:sticky;top:76px;z-index:40;background:#ffffffaa;backdrop-filter:saturate(180%) blur(10px);border-bottom:1px solid #ffe1ea}
.nav-inner{max-width:1280px;margin:0 auto;padding:10px 16px;display:flex;gap:8px;justify-content:center}
.tab{border:none;padding:10px 18px;border-radius:999px;background:#fff;color:#d6336c;font-weight:700;cursor:pointer;transition:.2s;box-shadow:0 2px 0 #ffe1ea}
.tab.active,.tab:hover{background:linear-gradient(135deg,var(--pink),var(--pink-2));color:#fff;transform:translateY(-1px);box-shadow:var(--shadow)}
.view{display:none;max-width:1280px;margin:18px auto;padding:0 16px}
.view.active{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.pos{display:grid;grid-template-columns:1.15fr .85fr;gap:20px;align-items:start}
@media(max-width:1024px){.pos{grid-template-columns:1fr;padding-bottom:340px}}
.panel{background:var(--card);backdrop-filter:blur(12px);border:1px solid #ffe1ea;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.tables{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.table-btn{border:1.5px solid #ffe1ea;background:#fff;padding:9px 14px;border-radius:12px;cursor:pointer;font-weight:700;color:#6b7280;transition:.18s}
.table-btn.active{background:linear-gradient(135deg,var(--pink),var(--pink-2));color:#fff;border-color:transparent;box-shadow:0 6px 16px rgba(255,92,138,.3)}
.search{width:100%;padding:13px 16px;border:1.5px solid #ffe1ea;border-radius:14px;font-size:1rem;outline:none;background:#fff;transition:.15s}
.search:focus{border-color:var(--pink-2);box-shadow:0 0 0 4px var(--ring)}
.cats{display:flex;gap:8px;overflow:auto;padding:10px 2px 14px;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat-btn{white-space:nowrap;border:1.5px solid #ffe1ea;padding:9px 16px;border-radius:999px;background:#fff;color:#6b7280;font-weight:700;cursor:pointer}
.cat-btn.active{background:#fff0f5;color:#d6336c;border-color:#ffb3c7}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px}
.product{position:relative;background:#fff;border:1px solid #ffe9f0;border-radius:18px;padding:12px;cursor:pointer;transition:.18s;box-shadow:0 4px 14px rgba(255,92,138,.08);overflow:hidden}
.product:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(255,92,138,.18);border-color:#ffc2d4}
.product .thumb{width:100%;aspect-ratio:1/1;border-radius:14px;background:#fff5f8;display:grid;place-items:center;overflow:hidden;margin-bottom:10px}
.product img{width:100%;height:100%;object-fit:cover}
.product .icon{font-size:2.4rem}
.product .name{font-weight:700;line-height:1.25;min-height:2.6em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.product .price{margin-top:6px;display:inline-flex;align-items:center;gap:6px;background:#fff0f5;color:#d6336c;font-weight:800;padding:6px 10px;border-radius:999px;border:1px solid #ffd0de}
.cart{position:sticky;top:132px;background:var(--card);backdrop-filter:blur(12px);border:1px solid #ffe1ea;border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;max-height:calc(100vh - 160px);overflow:hidden}
@media(max-width:1024px){.cart{position:fixed;left:12px;right:12px;bottom:12px;top:auto;max-height:58vh;border-radius:22px}}
.cart-header{padding:14px 16px;border-bottom:1px solid #ffe1ea;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,#ffffffcc,#ffffff99)}
.cart-header h3{color:#d6336c;font-size:1.05rem;font-weight:800}
.cart-count{background:#fff0f5;color:#d6336c;padding:4px 10px;border-radius:999px;font-weight:700;border:1px solid #ffd0de}
.cart-items{flex:1;overflow:auto;padding:12px;background:linear-gradient(to bottom,transparent, #fff0f566)}
.cart-empty{color:#9aa0a6;text-align:center;padding:36px 12px}
.cart-item{display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #ffe1ea;border-radius:14px;padding:10px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,.03)}
.cart-item .thumb{width:40px;height:40px;border-radius:10px;background:#fff5f8;display:grid;place-items:center;overflow:hidden;flex:0 0 40px}
.cart-item .thumb img{width:100%;height:100%;object-fit:cover}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-item-price{font-size:.85rem;color:#6b7280}
.qty{display:flex;align-items:center;gap:6px}
.qty-btn{width:30px;height:30px;border:none;background:#fff;border:1px solid #ffe1ea;border-radius:10px;cursor:pointer;font-weight:800;color:#d6336c}
.qty-btn:hover{background:#fff0f5}
.qty-val{min-width:26px;text-align:center;font-weight:800}
.cart-footer{padding:14px;border-top:1px solid #ffe1ea;background:#ffffffee}
.total{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.total strong{font-size:1.35rem;color:#d6336c}
.pay-btn{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--pink),var(--pink-2));color:#fff;font-weight:800;font-size:1.05rem;cursor:pointer;box-shadow:0 10px 20px rgba(255,92,138,.3);transition:.15s}
.pay-btn:hover{transform:translateY(-1px);box-shadow:0 14px 26px rgba(255,92,138,.35)}
.pay-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;margin-bottom:18px}
.stat{background:var(--card);border:1px solid #ffe1ea;border-radius:18px;padding:18px;text-align:center;box-shadow:var(--shadow)}
.stat h4{color:#6b7280;font-size:.9rem;margin-bottom:6px}
.stat .value{font-size:1.9rem;font-weight:800;color:#d6336c}
.section{background:var(--card);border:1px solid #ffe1ea;border-radius:18px;padding:16px;box-shadow:var(--shadow);margin-bottom:16px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.btn{padding:9px 14px;border:none;border-radius:10px;cursor:pointer;font-weight:700}
.btn-primary{background:linear-gradient(135deg,var(--pink),var(--pink-2));color:#fff}
.btn-danger{background:#fff1f2;color:#e11d48;border:1px solid #ffd0d6}
.btn-secondary{background:#fff;border:1px solid #ffe1ea;color:#d6336c}
.manage-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.add-form{display:grid;grid-template-columns:120px 1fr 110px 90px 1.2fr auto;gap:8px;background:var(--card);padding:12px;border:1px solid #ffe1ea;border-radius:14px;box-shadow:var(--shadow)}
@media(max-width:860px){.add-form{grid-template-columns:1fr 1fr}.add-form button{grid-column:1/-1}}
.add-form input,.add-form select{padding:11px;border:1.5px solid #ffe1ea;border-radius:10px;font-size:.95rem;outline:none;background:#fff}
.add-form input:focus,.add-form select:focus{border-color:var(--pink-2);box-shadow:0 0 0 3px var(--ring)}
.manage-cat{margin:18px 0}
.manage-cat h3{color:#d6336c;margin-bottom:8px}
.manage-item{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fff;border:1px solid #ffe1ea;border-radius:12px;padding:10px;margin-bottom:8px}
.manage-item .left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.manage-item .left img{width:34px;height:34px;border-radius:8px;object-fit:cover}
.manage-item .price{color:#d6336c;font-weight:800;margin-right:8px}
.manage-item button{padding:7px 12px;border:none;border-radius:9px;cursor:pointer;font-weight:700}
.manage-item .edit{background:#eef6ff;color:#1d4ed8;border:1px solid #dbeafe}
.manage-item .del{background:#fff1f2;color:#e11d48;border:1px solid #ffd0d6}
.modal{display:none;position:fixed;inset:0;background:rgba(17,17,17,.45);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal.show{display:flex}
.modal-content{background:#fff;border-radius:22px;padding:26px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);border:1px solid #ffe1ea}
.success-icon{font-size:3.2rem;text-align:center;margin-bottom:8px}

function renderStats(){const now=new Date();const today=now.toDateString();document.getElementById('stat-day').textContent=formatPrice(orders.filter(o=>new Date(o.time).toDateString()===today).reduce((s,o)=>s+o.total,0));const weekStart=new Date(now);weekStart.setDate(now.getDate()-now.getDay());document.getElementById('stat-week').textContent=formatPrice(orders.filter(o=>new Date(o.time)>=weekStart).reduce((s,o)=>s+o.total,0));document.getElementById('stat-month').textContent=formatPrice(orders.filter(o=>{const d=new Date(o.time);return d.getMonth()===now.getMonth()}).reduce((s,o)=>s+o.total,0));document.getElementById('history-list').innerHTML=orders.slice(0,50).map(o=>`<div class="history-item"><div class="history-info"><strong>${o.table}</strong> • ${o.items.map(i=>`${i.name}x${i.qty}`).join(', ')}<div class="history-time">${new Date(o.time).toLocaleString('vi-VN')} • ${o.user}</div></div><div class="history-total">${formatPrice(o.total)}</div></div>`).join('')||'Chưa có';const counts={};orders.forEach(o=>o.items.forEach(i=>counts[i.name]=(counts[i.name]||0)+i.qty));document.getElementById('top-products').innerHTML=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([n,q])=>`<div class="top-item"><span>${n}</span><strong>${q}</strong></div>`).join('');}
function clearHistory(){if(currentUser.role!=='admin'){alert('Chỉ admin được xóa!');return;}if(!confirm('Xóa hết lịch sử?'))return;orders=[];saveAll();renderStats();}
function renderManageList(){const c=document.getElementById('manageList');let h='';Object.entries(menu).forEach(([k,items])=>{h+=`<div class="manage-cat"><h3>${CATS[k]} (${items.length})</h3>`;items.forEach((p,i)=>{const thumb=p.img?`<img src="${p.img}">`:`<span style="font-size:20px">${p.icon||'🧋'}</span>`;h+=`<div class="manage-item"><div class="left">${thumb}<div style="font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</div></div><div class="price">${formatPrice(p.price)}</div><div><button class="edit" onclick="editProduct('${k}',${i})">Sửa</button><button class="del" onclick="deleteProduct('${k}',${i})">Xóa</button></div></div>`});h+='</div>'});c.innerHTML=h;}
let editingCat,editingIdx;function editProduct(c,i){const p=menu[c][i];editingCat=c;editingIdx=i;editName.value=p.name;editPrice.value=p.price;editIcon.value=p.icon||'';editImg.value=p.img||'';editModal.classList.add('show');}
function saveEdit(){menu[editingCat][editingIdx]={name:editName.value,price:+editPrice.value,icon:editIcon.value,img:editImg.value};saveAll();renderManageList();renderProducts();editModal.classList.remove('show');}
function deleteProduct(c,i){if(!confirm('Xóa?'))return;menu[c].splice(i,1);saveAll();renderManageList();renderProducts();}
document.addEventListener('DOMContentLoaded',()=>{
  db.ref(DB_PATH).on('value',snap=>{const d=snap.val()||{};if(d.menu)menu=d.menu;if(d.orders)orders=d.orders;if(d.carts)carts=d.carts;['Mang về',...Array(10).fill(0).map((_,i)=>`Bàn ${i+1}`)].forEach(t=>{if(!carts[t])carts[t]=[]});localStorage.setItem(LS_MENU,JSON.stringify(menu));renderCats();renderProducts();renderCart();renderStats();});
  selectTable('Mang về');searchBox.oninput=renderProducts;payBtn.onclick=checkout;closeSuccess.onclick=closeModal;printBtn.onclick=printReceipt;clearHistoryBtn.onclick=clearHistory;exportBtn.onclick=()=>{const b=new Blob([JSON.stringify(menu,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='menu.json';a.click()};importBtn.onclick=()=>importFile.click();importFile.onchange=e=>{const f=e.target.files[0];const r=new FileReader();r.onload=()=>{menu=JSON.parse(r.result);saveAll();renderManageList()};r.readAsText(f)};productForm.onsubmit=e=>{e.preventDefault();const c=newCat.value;if(!menu[c])menu[c]=[];menu[c].push({name:newName.value,price:+newPrice.value,icon:newIcon.value,img:newImg.value});saveAll();e.target.reset();renderManageList();renderProducts()};cancelEdit.onclick=()=>editModal.classList.remove('show');saveEditBtn=saveEdit;document.getElementById('saveEdit').onclick=saveEdit;
});
