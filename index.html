
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trà Sữa Như Say - POS</title>
<style>
:root{
  --pink:#ff6b9d;
  --pink-light:#ff8fab;
  --bg:#fff5f7;
  --white:#fff;
  --shadow:0 4px 20px rgba(255,107,157,.15);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:#333;line-height:1.5}
header{background:linear-gradient(135deg,var(--pink),var(--pink-light));color:white;padding:18px 16px;text-align:center;box-shadow:0 4px 12px rgba(255,107,157,.3)}
header h1{font-size:1.9rem;font-weight:800;letter-spacing:.5px;margin-bottom:4px;text-shadow:0 2px 4px rgba(0,0,0,.1)}
header .info{font-size:.9rem;opacity:.95;display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin-top:4px}
nav{display:flex;gap:8px;padding:10px;background:white;justify-content:center;position:sticky;top:0;z-index:50;box-shadow:0 2px 10px rgba(0,0,0,.05)}
nav button{border:none;padding:10px 22px;border-radius:999px;background:var(--bg);color:var(--pink);font-weight:600;cursor:pointer;transition:.2s;font-size:.95rem}
nav button.active,nav button:hover{background:linear-gradient(135deg,var(--pink),var(--pink-light));color:white;transform:translateY(-1px);box-shadow:var(--shadow)}
.view{display:none;max-width:1280px;margin:0 auto;padding:16px}
.view.active{display:block;animation:fade .3s}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.pos{display:grid;grid-template-columns:1fr 380px;gap:20px;align-items:start}
@media(max-width:980px){.pos{grid-template-columns:1fr;padding-bottom:320px}.cart{position:fixed;bottom:0;left:0;right:0;max-height:55vh;z-index:40;border-radius:24px 24px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.15)}}
.panel{background:white;border-radius:20px;padding:16px;box-shadow:var(--shadow)}
.tables{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.table-btn{border:2px solid #ffe1ea;background:white;padding:8px 14px;border-radius:12px;cursor:pointer;font-weight:600;color:#666;transition:.2s;font-size:.9rem}
.table-btn.active{background:linear-gradient(135deg,var(--pink),var(--pink-light));color:white;border-color:transparent;box-shadow:0 4px 12px rgba(255,107,157,.3)}
.search{width:100%;padding:12px 16px;border:2px solid #ffe1ea;border-radius:14px;margin-bottom:12px;font-size:1rem;outline:none;transition:.2s;background:#fff}
.search:focus{border-color:var(--pink-light);box-shadow:0 0 0 3px rgba(255,107,157,.15)}
.cats{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat-btn{white-space:nowrap;border:none;padding:9px 18px;border-radius:999px;background:var(--bg);color:#666;font-weight:600;cursor:pointer;transition:.2s;font-size:.9rem}
.cat-btn.active{background:var(--pink);color:white}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.product{background:white;border:2px solid #fff1f5;border-radius:16px;padding:14px;text-align:center;cursor:pointer;transition:.2s}
.product:hover{transform:translateY(-3px);border-color:var(--pink-light);box-shadow:var(--shadow)}
.product .icon{font-size:2.2rem;margin-bottom:6px}
.product .name{font-weight:600;font-size:.95rem;margin-bottom:4px;color:#333;min-height:2.6em;display:flex;align-items:center;justify-content:center}
.product .price{color:var(--pink);font-weight:700;font-size:1.05rem}
.cart{background:white;border-radius:20px;box-shadow:var(--shadow);display:flex;flex-direction:column;max-height:calc(100vh - 180px)}
.cart-header{padding:16px;border-bottom:2px solid var(--bg);display:flex;justify-content:space-between;align-items:center}
.cart-header h3{color:var(--pink);font-size:1.1rem}
.cart-count{background:var(--bg);padding:4px 10px;border-radius:999px;font-size:.85rem;color:var(--pink);font-weight:600}
.cart-items{flex:1;overflow-y:auto;padding:12px}
.cart-empty{text-align:center;padding:40px 20px;color:#999}
.cart-item{display:flex;gap:10px;padding:10px;border-radius:12px;margin-bottom:8px;background:var(--bg);align-items:center}
.cart-item-info{flex:1}
.cart-item-name{font-weight:600;font-size:.92rem;margin-bottom:2px}
.cart-item-price{font-size:.85rem;color:#666}
.cart-qty{display:flex;align-items:center;gap:6px}
.qty-btn{width:28px;height:28px;border:none;background:white;border-radius:8px;cursor:pointer;font-weight:700;color:var(--pink);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.qty-btn:hover{background:var(--pink);color:white}
.qty{min-width:24px;text-align:center;font-weight:600}
.cart-footer{padding:16px;border-top:2px solid var(--bg);background:white;border-radius:0 0 20px 20px}
.total{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:1.1rem}
.total strong{color:var(--pink);font-size:1.4rem}
.pay-btn{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--pink),var(--pink-light));color:white;font-weight:700;font-size:1.05rem;cursor:pointer;transition:.2s;box-shadow:0 4px 14px rgba(255,107,157,.3)}
.pay-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,107,157,.4)}
.pay-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:20px}
.stat{background:white;padding:18px;border-radius:16px;box-shadow:var(--shadow);text-align:center}
.stat h4{color:#666;font-size:.9rem;margin-bottom:8px;font-weight:600}
.stat .value{font-size:1.8rem;font-weight:800;color:var(--pink)}
.section{background:white;padding:18px;border-radius:16px;box-shadow:var(--shadow);margin-bottom:16px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.section-header h3{color:#333;font-size:1.1rem}
.btn{padding:8px 16px;border:none;border-radius:10px;cursor:pointer;font-weight:600;font-size:.9rem;transition:.2s}
.btn-primary{background:var(--pink);color:white}
.btn-danger{background:#ff4757;color:white}
.btn-secondary{background:var(--bg);color:var(--pink)}
.btn:hover{transform:translateY(-1px);opacity:.9}
.history-item,.top-item{padding:12px;background:var(--bg);border-radius:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.history-info{flex:1}
.history-time{font-size:.8rem;color:#888;margin-top:2px}
.history-total{font-weight:700;color:var(--pink);white-space:nowrap}
.manage-actions{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.add-form{display:grid;grid-template-columns:120px 1fr 100px 80px auto;gap:8px;margin-bottom:20px;background:white;padding:14px;border-radius:14px;box-shadow:var(--shadow)}
@media(max-width:720px){.add-form{grid-template-columns:1fr 1fr}.add-form button{grid-column:1/-1}}
.add-form input,.add-form select{padding:10px;border:2px solid #ffe1ea;border-radius:10px;font-size:.95rem;outline:none}
.add-form input:focus,.add-form select:focus{border-color:var(--pink)}
.add-form button{padding:10px 18px;background:var(--pink);color:white;border:none;border-radius:10px;font-weight:600;cursor:pointer}
.manage-cat{margin-bottom:24px}
.manage-cat h3{color:var(--pink);margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--bg)}
.manage-item{display:flex;justify-content:space-between;align-items:center;padding:12px;background:white;border-radius:12px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,.04);gap:10px}
.manage-item span:first-child{flex:1;font-weight:500}
.manage-item span:nth-child(2){color:var(--pink);font-weight:700;margin:0 12px;white-space:nowrap}
.manage-item button{padding:6px 12px;border:none;border-radius:8px;cursor:pointer;font-size:.85rem;margin-left:6px}
.manage-item .edit{background:#e3f2fd;color:#1976d2}
.manage-item .del{background:#ffebee;color:#d32f2f}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal.show{display:flex;animation:fade .2s}
.modal-content{background:white;border-radius:24px;padding:32px;max-width:400px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.success-icon{font-size:4rem;margin-bottom:16px;animation:scale .5s}
@keyframes scale{0%{transform:scale(0)}70%{transform:scale(1.1)}100%{transform:scale(1)}}
.modal-content h2{color:var(--pink);margin-bottom:8px}
.modal-content p{color:#666;margin-bottom:20px}
.modal-actions{display:flex;gap:10px;justify-content:center}
.modal-actions button{padding:10px 20px;border:none;border-radius:12px;font-weight:600;cursor:pointer;flex:1}
#printBtn{background:var(--pink);color:white}
#closeSuccess{background:var(--bg);color:#666}
</style>
</head>
<body>
<header>
  <h1>🧋 Trà Sữa Như Say</h1>
  <div class="info">
    <span>📍 Ngã 3 cơ xương, Ấp 2, Xuân Quế, Đồng Nai</span>
    <span>📞 0347.047.141 - 0523.83.36.83</span>
  </div>
</header>

<nav>
  <button id="tab-ban-hang" class="active" onclick="switchView('ban-hang')">🧋 Bán hàng</button>
  <button id="tab-doanh-thu" onclick="switchView('doanh-thu')">📊 Doanh thu</button>
  <button id="tab-quan-ly" onclick="switchView('quan-ly')">⚙️ Quản lý Menu</button>
</nav>

<!-- BÁN HÀNG -->
<section id="view-ban-hang" class="view active">
  <div class="pos">
    <div class="panel">
      <div class="tables">
        <button class="table-btn active" data-table="Mang về">🥡 Mang về</button>
        <button class="table-btn" data-table="Bàn 1">Bàn 1</button>
        <button class="table-btn" data-table="Bàn 2">Bàn 2</button>
        <button class="table-btn" data-table="Bàn 3">Bàn 3</button>
        <button class="table-btn" data-table="Bàn 4">Bàn 4</button>
        <button class="table-btn" data-table="Bàn 5">Bàn 5</button>
        <button class="table-btn" data-table="Bàn 6">Bàn 6</button>
        <button class="table-btn" data-table="Bàn 7">Bàn 7</button>
        <button class="table-btn" data-table="Bàn 8">Bàn 8</button>
        <button class="table-btn" data-table="Bàn 9">Bàn 9</button>
        <button class="table-btn" data-table="Bàn 10">Bàn 10</button>
      </div>
      <input id="searchBox" class="search" placeholder="🔍 Tìm món...">
      <div id="cats" class="cats"></div>
      <div id="products" class="products"></div>
    </div>

    <div class="cart">
      <div class="cart-header">
        <h3 id="cart-title">Mang về</h3>
        <span id="cart-count" class="cart-count">0 món</span>
      </div>
      <div id="cart-list" class="cart-items"></div>
      <div class="cart-footer">
        <div class="total"><span>Tổng cộng</span><strong id="total-amount">0đ</strong></div>
        <button id="payBtn" class="pay-btn">THANH TOÁN</button>
      </div>
    </div>
  </div>
</section>

<!-- DOANH THU -->
<section id="view-doanh-thu" class="view">
  <div class="stats">
    <div class="stat"><h4>Hôm nay</h4><div id="stat-day" class="value">0đ</div></div>
    <div class="stat"><h4>Tuần này</h4><div id="stat-week" class="value">0đ</div></div>
    <div class="stat"><h4>Tháng này</h4><div id="stat-month" class="value">0đ</div></div>
  </div>
  
  <div class="section">
    <div class="section-header">
      <h3>📜 Lịch sử đơn hàng</h3>
      <button id="clearHistoryBtn" class="btn btn-danger">🗑️ Xóa lịch sử</button>
    </div>
    <div id="history-list"></div>
  </div>

  <div class="section">
    <div class="section-header"><h3>🔥 Món bán chạy</h3></div>
    <div id="top-products"></div>
  </div>
</section>

<!-- QUẢN LÝ -->
<section id="view-quan-ly" class="view">
  <div class="manage-actions">
    <button id="exportBtn" class="btn btn-secondary">⬇️ Export JSON</button>
    <button id="importBtn" class="btn btn-secondary">⬆️ Import JSON</button>
    <input type="file" id="importFile" accept=".json" hidden>
  </div>

  <form id="productForm" class="add-form">
    <select id="newCat" required>
      <option value="trasua">Trà Sữa</option>
      <option value="tra">Trà Trái Cây</option>
      <option value="latte">Latte</option>
      <option value="yaourt">Yaourt</option>
      <option value="anvat">Ăn Vặt</option>
      <option value="topping">Topping</option>
    </select>
    <input id="newName" placeholder="Tên món *" required>
    <input id="newPrice" type="number" placeholder="Giá *" min="1" required>
    <input id="newIcon" placeholder="Icon" maxlength="2">
    <button type="submit">+ Thêm</button>
  </form>

  <div id="manageList"></div>
</section>

<!-- MODAL SUCCESS -->
<div id="successModal" class="modal">
  <div class="modal-content">
    <div class="success-icon">✅</div>
    <h2>Thanh toán thành công!</h2>
    <p id="successDetail"></p>
    <div class="modal-actions">
      <button id="printBtn">🧾 In hóa đơn</button>
      <button id="closeSuccess">Đóng</button>
    </div>
  </div>
</div>

<script>
const LS_MENU='tsns_menu_v33';
const LS_ORDERS='tsns_orders_v33';
const LS_CARTS='tsns_carts_v33';

const CATS = {
  trasua:'Trà Sữa',
  tra:'Trà Trái Cây',
  latte:'Latte',
  yaourt:'Yaourt',
  anvat:'Ăn Vặt',
  topping:'Topping'
};

const DEFAULT_MENU = {
  trasua: [
    {name:"Trà sữa truyền thống",price:25000,icon:"🧋",img:""},
    {name:"Trà sữa thái xanh",price:25000,icon:"💚",img:""},
    {name:"Trà sữa khoai môn",price:25000,icon:"💜",img:""},
    {name:"Trà sữa machiato",price:25000,icon:"☕",img:""},
    {name:"Trà sữa kem trứng",price:25000,icon:"🍮",img:""},
    {name:"Trà sữa matcha",price:25000,icon:"🍵",img:""},
    {name:"Trà sữa socola",price:25000,icon:"🍫",img:""},
    {name:"Trà sữa ôlong",price:25000,icon:"🍃",img:""},
    {name:"Trà sữa gạo rang",price:25000,icon:"🌾",img:""}
  ],
  tra: [
    {name:"Trà đào",price:20000,icon:"🍑",img:""},
    {name:"Trà vải",price:20000,icon:"🍒",img:""},
    {name:"Trà dưa lưới",price:20000,icon:"🍈",img:""},
    {name:"Trà dâu",price:20000,icon:"🍓",img:""},
    {name:"Trà xoài chanh dây",price:25000,icon:"🥭",img:""},
    {name:"Trà mãng cầu",price:25000,icon:"🥝",img:""},
    {name:"Trà lài đác thơm",price:25000,icon:"🍍",img:""},
    {name:"Trà nhiệt đới",price:25000,icon:"🏝️",img:""},
    {name:"Trà bưởi",price:20000,icon:"🍊",img:""},
    {name:"Trà ổi hồng",price:20000,icon:"🩷",img:""},
    {name:"Trà sen vàng",price:30000,icon:"🌼",img:""}
  ],
  latte: [
    {name:"Triple matcha",price:25000,icon:"🍵",img:""},
    {name:"Latte cold wised",price:25000,icon:"🥤",img:""},
    {name:"Matcha latte",price:20000,icon:"💚",img:""},
    {name:"Cacao latte",price:20000,icon:"🍫",img:""},
    {name:"Cacao kem muối",price:25000,icon:"🧂",img:""},
    {name:"Khoai môn latte",price:20000,icon:"💜",img:""},
    {name:"Khoai môn kem muối",price:25000,icon:"🧂",img:""}
  ],
  yaourt: [
    {name:"Yaourt dâu",price:25000,icon:"🍓",img:""},
    {name:"Yaourt kiwi",price:25000,icon:"🥝",img:""},
    {name:"Yaourt việt quất",price:25000,icon:"🫐",img:""},
    {name:"Yaourt chanh dây",price:25000,icon:"🥭",img:""},
    {name:"Yaourt đào",price:25000,icon:"🍑",img:""}
  ],
  anvat: [
    {name:"Bánh tráng mỡ hành",price:20000,icon:"🥬",img:""},
    {name:"Bánh tráng tóp mỡ",price:25000,icon:"🌯",img:""},
    {name:"Khoai tây chiên",price:25000,icon:"🍟",img:""},
    {name:"Cá viên chiên 30K",price:30000,icon:"🍢",img:""},
    {name:"Cá viên chiên 50K",price:50000,icon:"🍢",img:""},
    {name:"Cá viên chiên 70K",price:70000,icon:"🍢",img:""},
    {name:"Cá viên chiên 100K",price:100000,icon:"🍢",img:""}
  ],
  topping: [
    {name:"Puding",price:5000,icon:"🍮",img:""},
    {name:"Thạch phô mai",price:5000,icon:"🧀",img:""},
    {name:"Khúc bạch",price:5000,icon:"🤍",img:""},
    {name:"Trân châu trắng",price:5000,icon:"⚪",img:""},
    {name:"Bánh plan",price:6000,icon:"🍮",img:""}
  ]
};

let menu = JSON.parse(localStorage.getItem(LS_MENU)) || DEFAULT_MENU;
let orders = JSON.parse(localStorage.getItem(LS_ORDERS)) || [];
let carts = JSON.parse(localStorage.getItem(LS_CARTS)) || {};
let currentTable = 'Mang về';
let currentCat = 'trasua';
let lastOrder = null;

['Mang về',...Array.from({length:10},(_,i)=>`Bàn ${i+1}`)].forEach(t=>{ if(!carts[t]) carts[t]=[]; });

function saveAll(){
  localStorage.setItem(LS_MENU, JSON.stringify(menu));
  localStorage.setItem(LS_ORDERS, JSON.stringify(orders));
  localStorage.setItem(LS_CARTS, JSON.stringify(carts));
}

function formatPrice(n){ return new Intl.NumberFormat('vi-VN').format(n)+'đ'; }

function switchView(v){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+v).classList.add('active');
  if(v==='doanh-thu') renderStats();
  if(v==='quan-ly') renderManageList();
}

function renderCats(){
  const el=document.getElementById('cats');
  el.innerHTML=Object.entries(CATS).map(([k,n])=>`<button class="cat-btn ${k===currentCat?'active':''}" onclick="selectCat('${k}')">${n}</button>`).join('');
}

function selectCat(k){ currentCat=k; renderCats(); renderProducts(); }

function renderProducts(){
  const grid=document.getElementById('products');
  const term=document.getElementById('searchBox').value.toLowerCase().trim();
  const items = (menu[currentCat]||[]).filter(p=>p.name.toLowerCase().includes(term));
  grid.innerHTML = items.map(p=>{
    const realIdx = menu[currentCat].indexOf(p);
    return `<div class="product" onclick="addToCart('${currentCat}',${realIdx})">
      <div class="icon">${p.icon||'🧋'}</div>
      <div class="name">${p.name}</div>
      <div class="price">${formatPrice(p.price)}</div>
    </div>`;
  }).join('') || `<div style="grid-column:1/-1;text-align:center;padding:40px;color:#999">Không tìm thấy món</div>`;
}

function selectTable(t){
  currentTable=t;
  document.querySelectorAll('.table-btn').forEach(b=>b.classList.toggle('active', b.dataset.table===t));
  document.getElementById('cart-title').textContent=t;
  renderCart();
}

function addToCart(cat, idx){
  const p = menu[cat][idx];
  const cart = carts[currentTable];
  const found = cart.find(i=>i.name===p.name && i.price===p.price);
  if(found){ found.qty+=1; } 
  else { cart.push({name:p.name, price:p.price, icon:p.icon, qty:1}); }
  saveAll(); renderCart();
}

function renderCart(){
  const cart=carts[currentTable]||[];
  const list=document.getElementById('cart-list');
  if(cart.length===0){
    list.innerHTML=`<div class="cart-empty">🛒<br>Chưa có món nào</div>`;
  } else {
    list.innerHTML=cart.map((it,i)=>`
      <div class="cart-item">
        <div class="cart-item-info">
          <div class="cart-item-name">${it.icon||''} ${it.name}</div>
          <div class="cart-item-price">${formatPrice(it.price)}</div>
        </div>
        <div class="cart-qty">
          <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
          <span class="qty">${it.qty}</span>
          <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
        </div>
      </div>`).join('');
  }
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const itemCount=cart.reduce((s,i)=>s+i.qty,0);
  document.getElementById('cart-count').textContent=`${itemCount} món`;
  document.getElementById('total-amount').textContent=formatPrice(total);
  document.getElementById('payBtn').disabled=cart.length===0;
}

function changeQty(i,delta){
  const cart=carts[currentTable];
  if(!cart[i]) return;
  cart[i].qty += delta;
  // Prevent negative quantities
  if(cart[i].qty < 1){ cart.splice(i,1); }
  saveAll(); renderCart();
}

function checkout(){
  const cart=carts[currentTable];
  if(!cart.length) return;
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const order={id:Date.now(), table:currentTable, items:JSON.parse(JSON.stringify(cart)), total, time:new Date().toISOString()};
  orders.unshift(order);
  carts[currentTable]=[];
  lastOrder=order;
  saveAll(); renderCart();
  document.getElementById('successDetail').textContent=`${order.table} • ${formatPrice(order.total)} • ${new Date().toLocaleTimeString('vi-VN')}`;
  document.getElementById('successModal').classList.add('show');
  renderStats();
}

function closeModal(){ document.getElementById('successModal').classList.remove('show'); }

function printReceipt(){
  if(!lastOrder) return;
  const o=lastOrder;
  const w=window.open('','_blank','width=380,height=600');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Hóa đơn</title>

  </head><body>
  <h1>🧋 TRÀ SỮA NHƯ SAY</h1>

  <div>HD: #${o.id.toString().slice(-6)}<br>Bàn: ${o.table}<br>TG: ${new Date(o.time).toLocaleString('vi-VN')}</div>

  <button onclick="window.print()">In hóa đơn</button>

function renderStats(){
  const now=new Date();
  const today=now.toDateString();
  const dayTotal=orders.filter(o=>new Date(o.time).toDateString()===today).reduce((s,o)=>s+o.total,0);
  const weekStart=new Date(now); weekStart.setDate(now.getDate()-now.getDay()); weekStart.setHours(0,0,0,0);
  const weekTotal=orders.filter(o=>new Date(o.time)>=weekStart).reduce((s,o)=>s+o.total,0);
  const month=now.getMonth(); const year=now.getFullYear();
  const monthTotal=orders.filter(o=>{const d=new Date(o.time); return d.getMonth()===month && d.getFullYear()===year}).reduce((s,o)=>s+o.total,0);
  
  document.getElementById('stat-day').textContent=formatPrice(dayTotal);
  document.getElementById('stat-week').textContent=formatPrice(weekTotal);
  document.getElementById('stat-month').textContent=formatPrice(monthTotal);

  const hist=document.getElementById('history-list');
  hist.innerHTML = orders.slice(0,100).map(o=>`
    <div class="history-item">
      <div class="history-info">
        <strong>${o.table}</strong> • ${o.items.map(i=>`${i.name} x${i.qty}`).join(', ')}
        <div class="history-time">${new Date(o.time).toLocaleString('vi-VN')}</div>
      </div>
      <div class="history-total">${formatPrice(o.total)}</div>
    </div>`).join('') || '<div style="text-align:center;color:#999;padding20px">Chưa có đơn hàng</div>';

  const counts={};
  orders.forEach(o=>o.items.forEach(i=>{counts[i.name]=(counts[i.name]||0)+i.qty}));
  const top=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  document.getElementById('top-products').innerHTML = top.map(([n,q])=>`<div class="top-item"><span>${n}</span><strong>${q} ly</strong></div>`).join('') || '<div style="text-align:center;color:#999;padding20px">Chưa có dữ liệu</div>';
}

function clearHistory(){
  if(!confirm('⚠️ Xóa toàn bộ lịch sử doanh thu?\nHành động này không thể hoàn tác!')) return;
  orders=[]; saveAll(); renderStats();
}

function renderManageList(){
  const container=document.getElementById('manageList');
  let html='';
  // FIX: build html in loop, assign once outside
  Object.entries(menu).forEach(([catKey, items])=>{
    const catName=CATS[catKey]||catKey;
    html+=`<div class="manage-cat"><h3>${catName} (${items.length})</h3>`;
    items.forEach((p,idx)=>{
      html+=`<div class="manage-item">
        <span>${p.icon||'🧋'} ${p.name}</span>
        <span>${formatPrice(p.price)}</span>
        <div>
          <button class="edit" onclick="editProduct('${catKey}',${idx})">Sửa</button>
          <button class="del" onclick="deleteProduct('${catKey}',${idx})">Xóa</button>
        </div>
      </div>`;
    });
    html+=`</div>`;
  });
  container.innerHTML = html; // assigned outside outer loop
}

function editProduct(cat,idx){
  const p=menu[cat][idx];
  const name=prompt('Tên món:',p.name);
  if(name===null) return;
  const priceStr=prompt('Giá (VND):',p.price);
  if(priceStr===null) return;
  const price=parseInt(priceStr);
  // Validate inputs
  if(!name.trim()){ alert('❌ Tên món không được trống'); return; }
  if(!price || price<=0){ alert('❌ Giá phải lớn hơn 0'); return; }
  const icon=prompt('Icon emoji:',p.icon||'🧋')||p.icon;
  p.name=name.trim(); p.price=price; p.icon=icon;
  saveAll(); renderManageList(); renderProducts();
}

function deleteProduct(cat,idx){
  if(!confirm('Xóa món này khỏi menu?')) return;
  menu[cat].splice(idx,1);
  saveAll(); renderManageList(); renderProducts();
}

function exportMenu(){
  const data=JSON.stringify(menu,null,2);
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`trasua-nhusay-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importMenu(e){
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(confirm('Ghi đè menu hiện tại bằng file backup?')){
        menu=data; saveAll(); renderManageList(); renderProducts(); alert('✅ Import thành công!');
      }
    }catch(err){ alert('❌ File không hợp lệ'); }
  };
  reader.readAsText(file);
  e.target.value='';
}

document.addEventListener('DOMContentLoaded',()=>{
  renderCats(); renderProducts(); selectTable('Mang về'); renderStats();
  document.getElementById('searchBox').addEventListener('input',renderProducts);
  document.querySelectorAll('.table-btn').forEach(b=>b.addEventListener('click',()=>selectTable(b.dataset.table)));
  document.getElementById('payBtn').addEventListener('click',checkout);
  document.getElementById('closeSuccess').addEventListener('click',closeModal);
  document.getElementById('printBtn').addEventListener('click',printReceipt);
  document.getElementById('clearHistoryBtn').addEventListener('click',clearHistory);
  document.getElementById('exportBtn').addEventListener('click',exportMenu);
  document.getElementById('importBtn').addEventListener('click',()=>document.getElementById('importFile').click());
  document.getElementById('importFile').addEventListener('change',importMenu);
  
  document.getElementById('productForm').addEventListener('submit',e=>{
    e.preventDefault();
    const cat=document.getElementById('newCat').value;
    const name=document.getElementById('newName').value.trim();
    const price=parseInt(document.getElementById('newPrice').value);
    const icon=document.getElementById('newIcon').value||'🧋';
    // Validate inputs
    if(!name){ alert('❌ Vui lòng nhập tên món'); return; }
    if(!price || price<=0){ alert('❌ Giá phải lớn hơn 0'); return; }
    if(!menu[cat]) menu[cat]=[];
    menu[cat].push({name,price,icon,img:''});
    saveAll(); e.target.reset(); renderManageList(); renderProducts();
  });

  // Close modal when clicking backdrop
  document.getElementById('successModal').addEventListener('click',e=>{
    if(e.target.id==='successModal') closeModal();
  });
});

// Expose for inline onclick
window.addToCart=addToCart;
window.selectCat=selectCat;
window.changeQty=changeQty;
window.editProduct=editProduct;
window.deleteProduct=deleteProduct;
window.switchView=switchView;
</script>
